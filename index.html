<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #capture-wrapper {
            padding: 0;
            margin: 0;
            display: inline-block;
            line-height: 0;
        }

        .card-container {
            width: 337.5px; 
            height: 600px; 
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 8px solid #1e293b;
            background: #0f172a;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
        }

        .canvas-area.glow-mode {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }

        .safe-area-4-5 {
            width: 337.5px;
            height: 421.875px; 
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px; 
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        .guides-active .safe-area-4-5 {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .cell-1 {
            width: 44px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .sidebar-brand {
            width: 100%;
            background: #3b82f6;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 4px;
            margin-bottom: 8px;
        }

        .social-icons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            color: white;
            width: 100%;
        }

        .social-icons-grid i {
            font-size: 8px;
            text-align: center;
        }

        .compact-date {
            font-size: 6.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            line-height: 1.2;
        }

        .cell-2 {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .caption-text {
            font-size: 11px;
            font-weight: 400;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.95);
            text-align: left;
            outline: none;
            margin-bottom: 2px;
        }

        .content-box {
            width: 100%;
            min-height: 0px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content-box.is-empty {
            border-color: transparent;
            background: transparent;
            min-height: 0;
            height: 0;
            margin: 0;
            opacity: 0;
        }

        .content-box.has-image {
            min-height: 100px;
            margin-top: 12px;
            opacity: 1;
            border-style: solid;
        }

        .media-asset {
            width: 100%;
            height: auto;
            max-height: 280px;
            object-fit: contain;
            display: block;
        }

        .controls-panel {
            margin-top: 24px;
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .hidden { display: none !important; }

        #shareStatus {
            font-size: 10px;
            text-align: center;
            margin-top: 8px;
            color: #3b82f6;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }
        
        .input-group input {
            flex-grow: 1;
        }

        .input-group button {
            width: auto;
            padding-left: 16px;
            padding-right: 16px;
        }

    </style>
</head>
<body>

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">pxltr studio</h1>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest">Universal Asset Creator</p>
    </div>

    <div id="capture-wrapper">
        <div class="card-container" id="captureCard">
            <div class="canvas-area glow-mode" id="cardCanvas">
                
                <div class="safe-area-4-5" id="safeArea">
                    <div class="cell-1">
                        <div class="sidebar-brand">
                            <div class="social-icons-grid">
                                <i class="fa-brands fa-facebook-f"></i>
                                <i class="fa-brands fa-threads"></i>
                                <i class="fa-brands fa-youtube"></i>
                                <i class="fa-brands fa-instagram"></i>
                            </div>
                        </div>
                        <div class="compact-date" id="displayDate">JAN 23, 2026</div>
                    </div>

                    <div class="cell-2">
                        <div class="caption-text" id="displayCaption" contenteditable="true">
                            Enter your text here. This layout adjusts automatically whether you have an image or not.
                        </div>
                        
                        <div class="content-box is-empty" id="mainBox">
                            <img src="" id="mainImage" class="media-asset hidden" crossorigin="anonymous">
                        </div>
                    </div>
                </div>

                <div class="absolute bottom-6 flex justify-center w-full">
                    <div class="h-1 w-12 bg-white/20 rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="section-title">Media Management</div>
        
        <div class="mb-4">
            <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Image URL</label>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="https://image-link.com/photo.jpg">
                <button type="button" class="btn bg-slate-700" onclick="handleUrlUpload()">
                    <i class="fa-solid fa-link"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button type="button" class="btn bg-slate-800" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-camera"></i> Upload File
            </button>
            <button type="button" id="removeImgBtn" class="btn bg-red-500/10 text-red-400 border border-red-500/20 hidden" onclick="removeImage()">
                <i class="fa-solid fa-xmark"></i> Clear
            </button>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(event)">

        <div class="section-title">Visual Settings</div>
        <div class="flex flex-wrap gap-4 mb-4">
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="glowToggle" onchange="toggleGlow()" checked> 
                <span>Glow Effect</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="guideToggle" onchange="toggleGuides()"> 
                <span>Show Safe Zone</span>
            </label>
        </div>

        <div class="section-title">Editor</div>
        <div class="mb-4">
            <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Date</label>
            <input type="text" id="dateInput" oninput="updateDate()">
        </div>
        
        <div class="mb-4">
            <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Caption / Text</label>
            <textarea id="captionInput" rows="4" oninput="updateCaption()"></textarea>
        </div>

        <button id="shareBtn" type="button" class="btn bg-emerald-600 hover:bg-emerald-500" onclick="exportAndShare()">
            <i class="fa-solid fa-share-nodes"></i> Export & Share
        </button>
        <div id="shareStatus" class="hidden">Generating High-Res Card...</div>
    </div>

    <script>
        let currentObjectUrl = null;

        const img = document.getElementById('mainImage');
        const mainBox = document.getElementById('mainBox');
        const displayCaption = document.getElementById('displayCaption');
        const shareBtn = document.getElementById('shareBtn');
        const shareStatus = document.getElementById('shareStatus');
        const removeImgBtn = document.getElementById('removeImgBtn');
        const urlInput = document.getElementById('urlInput');

        function toggleGuides() {
            document.getElementById('cardCanvas').classList.toggle('guides-active', document.getElementById('guideToggle').checked);
        }

        function toggleGlow() {
            document.getElementById('cardCanvas').classList.toggle('glow-mode', document.getElementById('glowToggle').checked);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            if (currentObjectUrl) {
                if (currentObjectUrl.startsWith('blob:')) URL.revokeObjectURL(currentObjectUrl);
            }
            
            currentObjectUrl = URL.createObjectURL(file);
            applyImage(currentObjectUrl);
            urlInput.value = "";
        }

        function handleUrlUpload() {
            const url = urlInput.value.trim();
            if (!url) return;
            
            if (currentObjectUrl && currentObjectUrl.startsWith('blob:')) {
                URL.revokeObjectURL(currentObjectUrl);
            }
            
            currentObjectUrl = url;
            applyImage(url);
        }

        function applyImage(source) {
            mainBox.classList.remove('is-empty');
            mainBox.classList.add('has-image');
            
            img.src = source;
            img.classList.remove('hidden');
            removeImgBtn.classList.remove('hidden');
        }

        function removeImage() {
            if (currentObjectUrl && currentObjectUrl.startsWith('blob:')) {
                URL.revokeObjectURL(currentObjectUrl);
            }
            currentObjectUrl = null;
            
            img.src = "";
            img.classList.add('hidden');
            
            mainBox.classList.remove('has-image');
            mainBox.classList.add('is-empty');
            
            removeImgBtn.classList.add('hidden');
            document.getElementById('fileInput').value = "";
            urlInput.value = "";
        }

        function updateDate() {
            document.getElementById('displayDate').innerText = document.getElementById('dateInput').value;
        }

        function updateCaption() {
            const val = document.getElementById('captionInput').value;
            displayCaption.innerText = val;
            if (!val.trim()) {
                displayCaption.classList.add('hidden');
            } else {
                displayCaption.classList.remove('hidden');
            }
        }

        async function exportAndShare() {
            shareBtn.disabled = true;
            shareStatus.classList.remove('hidden');
            shareStatus.innerText = "Processing Image...";
            
            const canvasArea = document.getElementById('cardCanvas');
            const guidesWasActive = canvasArea.classList.contains('guides-active');
            canvasArea.classList.remove('guides-active');
            
            try {
                // Pre-check if image is loaded for URL inputs
                if (img.src && !img.complete) {
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = () => reject(new Error("Image failed to load"));
                    });
                }

                const canvas = await html2canvas(canvasArea, { 
                    useCORS: true, 
                    scale: 4, 
                    width: 337.5, 
                    height: 600,
                    backgroundColor: null,
                    logging: false,
                    x: 0, y: 0, scrollX: 0, scrollY: 0
                });

                if(guidesWasActive) canvasArea.classList.add('guides-active');

                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                const file = new File([blob], `pxltr-${Date.now()}.png`, { type: 'image/png' });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'PXLTR Studio Card',
                        text: displayCaption.innerText.substring(0, 50) + '...'
                    });
                } else {
                    const link = document.createElement('a');
                    link.download = file.name;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                }
            } catch (err) {
                console.error("Share failed", err);
                alert("Could not process image. If using a URL, ensure the host allows cross-origin requests.");
            } finally {
                shareBtn.disabled = false;
                shareStatus.classList.add('hidden');
            }
        }

        window.onload = () => {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options).toUpperCase();
            document.getElementById('displayDate').innerText = today;
            document.getElementById('dateInput').value = today;
            document.getElementById('captionInput').value = displayCaption.innerText.trim();
        };
    </script>
</body>
</html>
