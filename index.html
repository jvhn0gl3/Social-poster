<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Mini Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body::-webkit-scrollbar { display: none; }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .app-wrapper {
            display: flex;
            flex-direction: row;
            gap: 24px;
            align-items: flex-start;
            max-width: 850px;
            width: 100%;
            justify-content: center;
        }

        .card-container {
            width: 240px; 
            height: 426px;
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.8);
            border: 3px solid #1e293b;
            background: #000;
            flex-shrink: 0;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 15px;
            position: relative;
            transition: all 0.3s ease;
        }

        .safe-zone-1to1 {
            width: 210px; 
            height: 210px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.15); 
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 8px;
        }

        /* --- Mode Specific Styles --- */
        
        /* Text Only Mode */
        .caption-only-mode .safe-zone-1to1 {
            height: auto;
            justify-content: center;
            background: transparent;
            border-color: transparent;
            padding: 0;
        }
        .caption-only-mode .main-media-container { display: none; }
        .caption-only-mode .header-meta-row { flex-direction: column; align-items: center; text-align: center; gap: 8px; }
        .caption-only-mode .meta-pills { align-items: center; }
        .caption-only-mode .caption-text-area { font-size: 13px; max-height: none; font-weight: 400; line-height: 1.4; color: #fff; text-align: center; }
        .caption-only-mode .footer-row { margin-top: 16px; }

        /* Media Only Mode */
        .media-only-mode .caption-text-area { display: none; }
        .media-only-mode .main-media-container { height: 165px; } 
        /* Switch meta row to horizontal in media mode */
        .media-only-mode .meta-pills { flex-direction: row; align-items: center; }

        .header-meta-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
            flex-shrink: 0;
        }

        .meta-pills {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .caption-text-area {
            flex: 1;
            font-size: 8px;
            font-weight: 300;
            line-height: 1.3;
            color: rgba(255, 255, 255, 0.9);
            max-height: 32px;
            overflow: hidden;
            word-wrap: break-word;
        }

        .main-media-container {
            width: 100%;
            height: 135px; 
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: all 0.3s ease;
        }

        .main-media {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-shrink: 0;
            margin-top: auto;
        }

        .icon-bar-inline {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
        }

        .brand-pill, .date-pill {
            background: #3b82f6;
            color: white;
            border-radius: 100px;
            padding: 1px 6px;
            font-size: 6px;
            font-weight: 800;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .controls-panel {
            width: 280px;
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .input-group { margin-bottom: 10px; }
        .input-label {
            display: block;
            font-size: 9px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 3px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 6px 8px;
            color: white;
            font-size: 11px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            display: block;
            width: 100%;
            font-size: 10px;
            transition: all 0.2s;
            border: none;
        }

        .btn-secondary {
            background: #1e293b;
            border: 1px solid #334155;
        }

        .loading-spinner {
            display: none;
            width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        [contenteditable="true"]:focus { outline: none; background: rgba(59, 130, 246, 0.2); border-radius: 3px; }

        @media (max-width: 600px) {
            .app-wrapper { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="mb-6 text-center">
        <h1 class="text-xl font-black italic tracking-tighter">pxltr Studio</h1>
        <p class="text-slate-400 text-[8px] uppercase tracking-widest">Multimedia Design Board</p>
    </div>

    <div class="app-wrapper">
        <!-- Compact Card -->
        <div class="card-container" id="captureCard">
            <div class="canvas-area" id="mainCanvas">
                <div class="safe-zone-1to1" id="safeZone">
                    <div class="header-meta-row">
                        <div class="meta-pills">
                            <div class="date-pill" id="displayDate" contenteditable="true">02.04.2026</div>
                            <div class="brand-pill uppercase" id="displayHandle" contenteditable="true">@PXTR30</div>
                        </div>
                        <div class="caption-text-area" id="displayCaption" contenteditable="true">
                            Minimal scale, maximum impact. Keeping designs clean and compact.
                        </div>
                    </div>
                    
                    <div class="main-media-container" id="mediaWrapper">
                        <img 
                            src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=400" 
                            id="mainImage" 
                            class="main-media"
                        >
                        <video id="mainVideo" class="main-media hidden" controls playsinline loop></video>
                    </div>

                    <div class="footer-row">
                        <div class="icon-bar-inline">
                            <i class="fa-brands fa-facebook text-[6px]" style="color:#1877F2"></i>
                            <i class="fa-brands fa-youtube text-[6px]" style="color:#ff0000"></i>
                            <i class="fa-brands fa-threads text-[6px]" style="color:#fff"></i>
                            <i class="fa-brands fa-instagram text-[6px]" style="color:#E4405F"></i>
                            <i class="fa-brands fa-tiktok text-[6px]" style="color:#00f2ea"></i>
                        </div>
                        <div class="h-0.5 w-4 bg-white/20 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-panel">
            <div class="section-title">Display Mode</div>
            <div class="grid grid-cols-3 gap-1 mb-4">
                <button id="modeStandard" class="btn" onclick="setMode('standard')">Standard</button>
                <button id="modeCaption" class="btn btn-secondary" onclick="setMode('caption')">Text</button>
                <button id="modeMedia" class="btn btn-secondary" onclick="setMode('media')">Media</button>
            </div>

            <div id="visualsGroup">
                <div class="section-title">Visuals</div>
                <div class="mb-2">
                    <button class="btn bg-slate-800 border border-slate-700 w-full flex items-center justify-center gap-2" onclick="document.getElementById('fileInput').click()">
                        <i class="fa-solid fa-file-import text-[9px]"></i> Upload Media
                    </button>
                    <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(event)">
                </div>
            </div>

            <div id="textGroup">
                <div class="section-title mt-4">Meta</div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <div class="input-group">
                        <label class="input-label">Date</label>
                        <input type="text" id="dateInput" oninput="updateFromInput('dateInput', 'displayDate')">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Handle</label>
                        <input type="text" id="handleInput" oninput="updateFromInput('handleInput', 'displayHandle')">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Caption</label>
                    <textarea id="captionInput" rows="2" oninput="updateFromInput('captionInput', 'displayCaption')"></textarea>
                </div>
            </div>

            <div id="aiGroup">
                <div class="section-title mt-4">AI Gen</div>
                <div class="input-group">
                    <div class="flex gap-1">
                        <input type="text" id="aiPrompt" placeholder="Creative prompt...">
                        <button class="btn w-10" id="genImageBtn" onclick="generateAIImage()">
                            <div class="loading-spinner" id="genSpinner"></div>
                            <span id="genText">Go</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-4 p-3 bg-slate-800/30 rounded-lg border border-slate-700/50">
                <p class="text-[9px] text-slate-500 italic">
                    Tap any text on the card to edit directly.
                </p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let currentMode = 'standard';

        function setMode(mode) {
            currentMode = mode;
            const canvas = document.getElementById('mainCanvas');
            const visualsGroup = document.getElementById('visualsGroup');
            const aiGroup = document.getElementById('aiGroup');
            
            const btnStandard = document.getElementById('modeStandard');
            const btnCaption = document.getElementById('modeCaption');
            const btnMedia = document.getElementById('modeMedia');

            // Reset UI
            canvas.classList.remove('caption-only-mode', 'media-only-mode');
            visualsGroup.classList.remove('opacity-30', 'pointer-events-none');
            aiGroup.classList.remove('opacity-30', 'pointer-events-none');
            
            btnStandard.classList.add('btn-secondary');
            btnCaption.classList.add('btn-secondary');
            btnMedia.classList.add('btn-secondary');

            if (mode === 'caption') {
                canvas.classList.add('caption-only-mode');
                visualsGroup.classList.add('opacity-30', 'pointer-events-none');
                aiGroup.classList.add('opacity-30', 'pointer-events-none');
                btnCaption.classList.remove('btn-secondary');
            } else if (mode === 'media') {
                canvas.classList.add('media-only-mode');
                btnMedia.classList.remove('btn-secondary');
            } else {
                btnStandard.classList.remove('btn-secondary');
            }
        }

        function updateFromInput(inputId, targetId) {
            document.getElementById(targetId).innerText = document.getElementById(inputId).value;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const imageEl = document.getElementById('mainImage');
            const videoEl = document.getElementById('mainVideo');
            if (file.type.startsWith('video/')) {
                imageEl.classList.add('hidden');
                videoEl.classList.remove('hidden');
                videoEl.src = URL.createObjectURL(file);
                videoEl.play();
            } else {
                videoEl.classList.add('hidden');
                videoEl.pause();
                imageEl.classList.remove('hidden');
                const reader = new FileReader();
                reader.onload = (e) => { imageEl.src = e.target.result; };
                reader.readAsDataURL(file);
            }
        }

        async function generateAIImage() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) return;
            const btn = document.getElementById('genImageBtn'), spinner = document.getElementById('genSpinner'), text = document.getElementById('genText');
            btn.disabled = true; spinner.style.display = 'block'; text.style.display = 'none';

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ instances: [{ prompt: prompt }], parameters: { sampleCount: 1 } })
                });
                const data = await response.json();
                if (data.predictions?.[0]?.bytesBase64Encoded) {
                    document.getElementById('mainVideo').classList.add('hidden');
                    const img = document.getElementById('mainImage');
                    img.classList.remove('hidden');
                    img.src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                }
            } catch (err) { 
                console.error("AI Error:", err); 
            } finally { 
                btn.disabled = false; spinner.style.display = 'none'; text.style.display = 'inline'; 
            }
        }

        document.querySelectorAll('[contenteditable="true"]').forEach(el => {
            el.addEventListener('input', () => {
                const inputMap = { 'displayDate': 'dateInput', 'displayHandle': 'handleInput', 'displayCaption': 'captionInput' };
                if (inputMap[el.id]) document.getElementById(inputMap[el.id]).value = el.innerText;
            });
        });

        window.onload = () => {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}.${now.getFullYear()}`;
            document.getElementById('displayDate').innerText = dateStr;
            document.getElementById('dateInput').value = dateStr;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText;
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText;
        };
    </script>
</body>
</html>
