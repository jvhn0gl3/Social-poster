<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #capture-wrapper {
            padding: 0;
            margin: 0;
            display: inline-block;
        }

        /* STRICT 9:16 Outer Frame */
        .card-container {
            width: 337.5px; 
            height: 600px; 
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 8px solid #1e293b;
            background: #000;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .canvas-area.glow-mode {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }

        /* 4:5 Inner Content Zone */
        .safe-area-4-5 {
            width: 337.5px;
            height: 421.875px; 
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px; 
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        .guides-active .safe-area-4-5 {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255,255,255,0.1);
        }

        /* Branding Column */
        .cell-1 {
            width: 44px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .sidebar-brand {
            width: 100%;
            background: #3b82f6;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 4px;
            margin-bottom: 8px;
        }

        .social-icons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            color: white;
            width: 100%;
        }

        .social-icons-grid i {
            font-size: 8px;
            text-align: center;
        }

        .compact-date {
            font-size: 6.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            line-height: 1.2;
        }

        /* Content Column */
        .cell-2 {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .caption-text {
            font-size: 11px;
            font-weight: 400;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.95);
            text-align: left;
            outline: none;
            margin-bottom: 2px;
        }

        /* The Content Box / Media Container */
        .content-box {
            width: 100%;
            min-height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .media-asset {
            width: 100%;
            height: auto;
            max-height: 280px;
            object-fit: contain;
            display: block;
        }

        /* Controls Panel */
        .controls-panel {
            margin-top: 24px;
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">pxltr studio</h1>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest">Centered Layout • Motion Ready</p>
    </div>

    <div id="capture-wrapper">
        <div class="card-container" id="captureCard">
            <div class="canvas-area glow-mode guides-active" id="cardCanvas">
                
                <div class="safe-area-4-5" id="safeArea">
                    <div class="cell-1">
                        <div class="sidebar-brand">
                            <div class="social-icons-grid">
                                <i class="fa-brands fa-facebook-f"></i>
                                <i class="fa-brands fa-threads"></i>
                                <i class="fa-brands fa-youtube"></i>
                                <i class="fa-brands fa-instagram"></i>
                                <i class="fa-brands fa-tiktok"></i>
                                <i class="fa-solid fa-bolt text-[7px] opacity-40"></i>
                            </div>
                        </div>
                        <div class="compact-date" id="displayDate">JAN 23, 2026</div>
                    </div>

                    <div class="cell-2">
                        <div class="caption-text" id="displayCaption" contenteditable="true">
                            Click the upload button below to place media inside this box.
                        </div>
                        
                        <div class="content-box" id="mainBox">
                            <span id="placeholderText" class="text-[8px] uppercase tracking-widest opacity-30 font-bold">Media Area</span>
                            <img src="" id="mainImage" class="media-asset hidden" crossorigin="anonymous">
                            <video id="mainVideo" class="media-asset hidden" crossorigin="anonymous" playsinline muted loop autoplay></video>
                        </div>
                    </div>
                </div>

                <div class="absolute bottom-6 flex justify-center w-full">
                    <div class="h-1 w-12 bg-white/20 rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="section-title">Visual Settings</div>
        <div class="flex flex-wrap gap-4 mb-4">
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="glowToggle" onchange="toggleGlow()" checked> 
                <span>Glow Effect</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="guideToggle" onchange="toggleGuides()" checked> 
                <span>Show Safe Zone</span>
            </label>
        </div>

        <button type="button" class="btn bg-slate-800 mb-6" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-upload"></i> Upload Image or Video
        </button>
        <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(event)">

        <div class="section-title">Editor</div>
        <div class="mb-4">
            <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Date Display</label>
            <input type="text" id="dateInput" oninput="updateDate()">
        </div>
        
        <div class="mb-4">
            <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Caption (Delete to Hide)</label>
            <textarea id="captionInput" rows="3" oninput="updateCaption()"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button type="button" class="btn bg-emerald-600 hover:bg-emerald-500" onclick="downloadScreenshot()">
                <i class="fa-solid fa-image"></i> Export PNG
            </button>
            <button id="recordBtn" type="button" class="btn bg-blue-600 hover:bg-blue-500 hidden" onclick="startRecording()">
                <i class="fa-solid fa-circle"></i> Record 9:16
            </button>
        </div>
    </div>

    <script>
        let recorder = null;
        let chunks = [];
        let currentObjectUrl = null;

        const img = document.getElementById('mainImage');
        const video = document.getElementById('mainVideo');
        const recordBtn = document.getElementById('recordBtn');
        const placeholder = document.getElementById('placeholderText');
        const mainBox = document.getElementById('mainBox');
        const displayCaption = document.getElementById('displayCaption');

        function toggleGuides() {
            document.getElementById('cardCanvas').classList.toggle('guides-active', document.getElementById('guideToggle').checked);
        }

        function toggleGlow() {
            document.getElementById('cardCanvas').classList.toggle('glow-mode', document.getElementById('glowToggle').checked);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
            currentObjectUrl = URL.createObjectURL(file);

            placeholder.classList.add('hidden');
            mainBox.style.border = "none";
            mainBox.style.background = "transparent";

            if (file.type.startsWith('image/')) {
                video.classList.add('hidden');
                video.pause();
                img.classList.remove('hidden');
                recordBtn.classList.add('hidden');
                img.src = currentObjectUrl;
            } else if (file.type.startsWith('video/')) {
                img.classList.add('hidden');
                video.classList.remove('hidden');
                recordBtn.classList.remove('hidden');
                video.src = currentObjectUrl;
                video.load();
                video.play().catch(e => console.log("Auto-play prevented", e));
            }
        }

        function updateDate() {
            document.getElementById('displayDate').innerText = document.getElementById('dateInput').value;
        }

        function updateCaption() {
            const val = document.getElementById('captionInput').value;
            displayCaption.innerText = val;
            
            if (!val.trim()) {
                displayCaption.classList.add('hidden');
            } else {
                displayCaption.classList.remove('hidden');
            }
        }

        async function downloadScreenshot() {
            const canvasArea = document.getElementById('cardCanvas');
            const guidesActive = canvasArea.classList.contains('guides-active');
            if(guidesActive) canvasArea.classList.remove('guides-active');
            
            const canvas = await html2canvas(canvasArea, { 
                useCORS: true, 
                scale: 4, 
                width: 337.5, 
                height: 600,
                backgroundColor: '#000000'
            });

            if(guidesActive) canvasArea.classList.add('guides-active');
            const link = document.createElement('a');
            link.download = `pxltr-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        async function startRecording() {
            const canvasArea = document.getElementById('cardCanvas');
            const SCALE = 2.5; 
            const W = 337.5;
            const H = 600;
            
            const recCanvas = document.createElement('canvas');
            recCanvas.width = W * SCALE;
            recCanvas.height = H * SCALE;
            const ctx = recCanvas.getContext('2d');
            
            const guidesActive = canvasArea.classList.contains('guides-active');
            if(guidesActive) canvasArea.classList.remove('guides-active');
            
            // Temporary styles for cleaner recording
            const originalVideoOpacity = video.style.opacity;
            video.style.opacity = '0';
            
            const rect = video.getBoundingClientRect();
            const canvasRect = canvasArea.getBoundingClientRect();
            const offsetX = (rect.left - canvasRect.left) * SCALE;
            const offsetY = (rect.top - canvasRect.top) * SCALE;
            const boxW = rect.width * SCALE;
            const boxH = rect.height * SCALE;

            // Render the static UI components
            const uiCanvas = await html2canvas(canvasArea, {
                scale: SCALE, width: W, height: H, useCORS: true, backgroundColor: '#000000'
            });
            
            video.style.opacity = originalVideoOpacity || '1';
            if(guidesActive) canvasArea.classList.add('guides-active');

            const stream = recCanvas.captureStream(30);
            // Capture audio if available
            if (video.captureStream || video.mozCaptureStream) {
                const vidStream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
                const audioTracks = vidStream.getAudioTracks();
                if(audioTracks.length > 0) audioTracks.forEach(t => stream.addTrack(t));
            }

            recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9,opus' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `pxltr-motion-${Date.now()}.webm`;
                a.click();
                recordBtn.disabled = false;
                recordBtn.innerHTML = '<i class="fa-solid fa-circle"></i> Record 9:16';
            };

            video.currentTime = 0;
            video.muted = false; 
            recordBtn.disabled = true;
            recordBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Recording...';

            recorder.start();
            video.play();

            function drawLoop() {
                if (video.paused || video.ended || recorder.state === "inactive") {
                    if (recorder.state === "recording") recorder.stop();
                    return;
                }
                ctx.drawImage(uiCanvas, 0, 0);
                ctx.drawImage(video, offsetX, offsetY, boxW, boxH);
                requestAnimationFrame(drawLoop);
            }
            drawLoop();
        }

        window.onload = () => {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options).toUpperCase();
            document.getElementById('displayDate').innerText = today;
            document.getElementById('dateInput').value = today;
            
            const initialCaption = displayCaption.innerText.trim();
            document.getElementById('captionInput').value = initialCaption;
            
            displayCaption.addEventListener('input', () => {
                document.getElementById('captionInput').value = displayCaption.innerText;
                if (!displayCaption.innerText.trim()) displayCaption.classList.add('hidden');
            });
        };
    </script>
</body>
</html>
