<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio Square - Platform Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --accent-dark: #1e40af;
        }

        body {
            background-color: #05070a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.1) 0px, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .stage-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            perspective: 1200px;
        }

        .middle-row {
            display: flex;
            align-items: center; 
            gap: 14px; 
            position: relative;
        }

        #captureArea {
            width: 300px; 
            height: 300px; 
            background-color: #0f131f;
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%),
                radial-gradient(circle at 50% 0%, #1e2638 0%, #0f131f 95%);
            border-radius: 48px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
            border: none;
            aspect-ratio: 1 / 1;
            animation: breathe 8s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.015); }
        }

        #captureArea::after {
            content: "";
            position: absolute;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.04;
            pointer-events: none;
            z-index: 5;
        }

        .external-meta-row {
            display: flex;
            width: 300px;
            justify-content: center;
            gap: 4px;
            z-index: 10;
        }

        .tag {
            height: 28px; 
            padding: 0 10px;
            font-size: 8px; 
            font-weight: 900;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            border-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .tag-blue {
            background: var(--accent);
            color: #ffffff;
        }

        .tag-gray {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        #previewText {
            font-size: 32px; 
            line-height: 1.1;
            font-weight: 900;
            color: #ffffff;
            word-wrap: break-word;
            max-width: 100%;
            letter-spacing: -0.05em;
        }

        .external-side-bar {
            width: 36px; 
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 0;
            height: 180px; 
            backdrop-filter: blur(5px);
            justify-content: space-around;
        }

        .external-side-bar i {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px; 
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .footer-premium {
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            padding: 6px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .footer-part {
            font-size: 7.5px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.1em;
            padding: 0 15px;
            text-transform: uppercase;
        }

        .controls-container {
            width: 100%;
            max-width: 400px;
            background: rgba(17, 24, 39, 0.8);
            margin-top: 40px;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            margin-bottom: 80px;
        }

        .input-label {
            color: #60a5fa;
            text-transform: uppercase;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .input-field {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 13px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

    <div class="header-main text-center mb-8">
        <h1 class="text-xl font-black italic tracking-tighter text-blue-500">PXTR STUDIO</h1>
        <div class="h-[2px] w-4 bg-white/20 mx-auto mt-2"></div>
    </div>

    <div class="stage-wrapper" id="stage">
        
        <div class="external-meta-row">
            <div class="tag tag-gray" id="dayOfYearTag">DAY 000</div>
            <div class="tag tag-gray" id="progressTag">0%</div>
            <div class="tag tag-blue" id="dateTag">03.02.2026</div>
            <div class="tag tag-blue" style="background: var(--accent-dark);" id="handleTag">@jvhn0gl3</div>
        </div>

        <div class="middle-row">
            <!-- Left Sidebar -->
            <div class="external-side-bar">
                <i class="fa-brands fa-facebook text-blue-500"></i>
                <i class="fa-brands fa-threads text-white"></i>
            </div>

            <!-- The Main Card -->
            <div id="captureArea">
                <div class="content-area" id="contentArea">
                    <div id="previewText">hi</div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <div class="external-side-bar">
                <i class="fa-brands fa-youtube text-red-600"></i>
                <i class="fa-brands fa-instagram text-pink-500"></i>
            </div>
        </div>

        <div class="external-meta-row mt-1">
            <div class="footer-premium rounded-xl">
                <span class="footer-part" id="footerHandle">@jvhn0gl3 // JOHN-OGLETREE</span>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <span class="input-label">Project Date</span>
                <input type="text" id="inputDate" class="input-field" value="03.02.2026">
            </div>
            <div>
                <span class="input-label">Studio Handle</span>
                <input type="text" id="inputHandle" class="input-field" value="@jvhn0gl3">
            </div>
        </div>

        <div class="">
            <span class="input-label">Announcement Text</span>
            <textarea id="inputText" class="input-field h-24 resize-none">hi</textarea>
        </div>
    </div>

    <script>
        const elements = {
            dateTag: document.getElementById('dateTag'),
            handleTag: document.getElementById('handleTag'),
            progressTag: document.getElementById('progressTag'),
            dayOfYearTag: document.getElementById('dayOfYearTag'),
            previewText: document.getElementById('previewText'),
            contentArea: document.getElementById('contentArea'),
            inputDate: document.getElementById('inputDate'),
            inputHandle: document.getElementById('inputHandle'),
            inputText: document.getElementById('inputText'),
            footerHandle: document.getElementById('footerHandle')
        };

        function updateMetrics() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const diff = now - startOfYear;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay) + 1;
            elements.dayOfYearTag.innerText = `DAY ${dayOfYear.toString().padStart(3, '0')}`;

            const endOfYear = new Date(now.getFullYear() + 1, 0, 1);
            const progress = ((now - startOfYear) / (endOfYear - startOfYear)) * 100;
            elements.progressTag.innerText = Math.floor(progress) + '%';
        }

        function adjustFontSize() {
            const container = elements.contentArea;
            const text = elements.previewText;
            
            let fontSize = 120; // Increased base font size for short text like "hi"
            text.style.fontSize = fontSize + 'px';

            while (
                (text.scrollHeight > container.offsetHeight || text.scrollWidth > container.offsetWidth) && 
                fontSize > 12
            ) {
                fontSize--;
                text.style.fontSize = fontSize + 'px';
            }
        }

        setInterval(updateMetrics, 60000);
        updateMetrics();

        elements.inputDate.addEventListener('input', (e) => elements.dateTag.innerText = e.target.value);
        elements.inputHandle.addEventListener('input', (e) => {
            elements.handleTag.innerText = e.target.value;
            elements.footerHandle.innerText = `${e.target.value.toUpperCase()} // JOHN-OGLETREE`;
        });
        
        elements.inputText.addEventListener('input', (e) => {
            elements.previewText.innerText = e.target.value;
            adjustFontSize();
        });

        window.addEventListener('load', adjustFontSize);
    </script>
</body>
</html>
