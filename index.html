<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio Instagram Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --accent-dark: #1e40af;
            --bg-dark: #05070a;
        }

        body {
            background-color: #111;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* FULLSCREEN MODE: Crucial for the screenshot to capture the whole square */
        #exportSquare:fullscreen {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        /* 1:1 Ratio Container - Optimized for IG Crop */
        #exportSquare {
            width: 1080px; /* Full IG Resolution */
            height: 1080px;
            zoom: 0.5; /* Scale down for desktop viewing while keeping high-res internally */
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.2) 0px, transparent 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        #exportSquare::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.08;
            pointer-events: none;
            z-index: 1;
        }

        .post-inner {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Increased gap for high-res */
            width: 100%;
        }

        .meta-row { display: flex; gap: 12px; }

        .tag {
            height: 48px; 
            padding: 0 20px;
            font-size: 16px; 
            font-weight: 900;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); border: 2px solid rgba(255, 255, 255, 0.1); }

        .social-header-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 750px;
        }

        .social-cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 28px;
        }

        #captureArea {
            width: 750px; 
            height: 750px; 
            background-color: #0f131f;
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%),
                radial-gradient(circle at 50% 0%, #1e2638 0%, #0f131f 95%);
            border-radius: 90px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 60px 120px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px;
            overflow: hidden;
        }

        #previewText {
            line-height: 1.05;
            font-weight: 900;
            color: #ffffff;
            word-wrap: break-word;
            max-width: 100%;
            letter-spacing: -0.05em;
        }

        .footer-premium {
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            border-top: 2px solid rgba(255,255,255,0.05);
            width: 750px;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            border-radius: 20px;
        }

        .footer-part {
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Controls Panel */
        .controls-container {
            width: 540px;
            background: rgba(17, 24, 39, 0.9);
            margin-top: 20px;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-label { color: #60a5fa; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .input-field { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; width: 100%; color: white; margin-bottom: 12px; }
        .btn-fullscreen { background: var(--accent); color: white; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="exportSquare">
        <div class="post-inner">
            <div class="meta-row">
                <div class="tag tag-gray" id="dayOfYearTag">DAY 068</div>
                <div class="tag tag-gray" id="progressTag">18%</div>
                <div class="tag tag-blue" id="dateTag">03.09.2026</div>
                <div class="tag tag-blue" style="background: var(--accent-dark);" id="handleTag">@jvhn0gl3</div>
            </div>

            <div class="social-header-row">
                <div class="social-cell"><i class="fa-brands fa-facebook text-blue-500"></i><i class="fa-brands fa-threads text-white"></i></div>
                <div class="social-cell"><i class="fa-brands fa-youtube text-red-600"></i><i class="fa-brands fa-instagram text-pink-500"></i></div>
            </div>

            <div id="captureArea">
                <div class="content-area" id="contentArea">
                    <div id="previewText">INSTA READY</div>
                </div>
            </div>

            <div class="footer-premium">
                <span class="footer-part" id="footerHandle">@JVHN0GL3 // JOHN-OGLETREE</span>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <span class="input-label">Content</span>
        <textarea id="inputText" class="input-field h-20">INSTA READY</textarea>
        <button onclick="toggleFullscreen()" class="btn-fullscreen">Enter Screenshot Mode</button>
    </div>

    <script>
        const elements = {
            previewText: document.getElementById('previewText'),
            contentArea: document.getElementById('contentArea'),
            inputText: document.getElementById('inputText'),
            exportSquare: document.getElementById('exportSquare')
        };

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                elements.exportSquare.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function adjustFontSize() {
            const container = elements.contentArea;
            const text = elements.previewText;
            let fontSize = 250; 
            text.style.fontSize = fontSize + 'px';
            while ((text.scrollHeight > container.offsetHeight || text.scrollWidth > container.offsetWidth) && fontSize > 20) {
                fontSize -= 2;
                text.style.fontSize = fontSize + 'px';
            }
        }

        elements.inputText.addEventListener('input', (e) => {
            elements.previewText.innerText = e.target.value;
            adjustFontSize();
        });

        window.addEventListener('load', adjustFontSize);
        document.addEventListener('fullscreenchange', adjustFontSize);
    </script>
</body>
</html>
