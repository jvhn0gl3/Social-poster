<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio - Bulletproof Crop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --bg-dark: #05070a;
        }

        body {
            background-color: #111;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #exportSquare:fullscreen {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        /* 1:1 Canvas with Massive Padding */
        #exportSquare {
            width: 1000px; 
            height: 1000px;
            zoom: 0.5; 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.25) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.25) 0px, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .post-inner {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* Compact spacing */
        }

        .meta-row { display: flex; gap: 8px; }

        .tag {
            height: 32px; 
            padding: 0 12px;
            font-size: 11px; 
            font-weight: 900;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            border-radius: 6px;
            backdrop-filter: blur(10px);
        }
        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); }

        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 550px;
        }
        .social-cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            display: flex;
            justify-content: space-around;
            font-size: 20px;
        }

        /* The Main Card */
        #captureArea {
            width: 550px; 
            height: 550px; 
            background-color: #0f131f;
            background-image: radial-gradient(circle at 50% 0%, #1e2638 0%, #0f131f 100%);
            border-radius: 60px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px;
        }

        #previewText {
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -0.05em;
            line-height: 1;
        }

        /* Footer MOVED INSIDE the Card Area to prevent crop-out */
        .internal-footer {
            width: 100%;
            padding: 25px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.1em;
        }

        .controls-container {
            width: 400px;
            background: rgba(17, 24, 39, 0.9);
            margin-top: 20px;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; width: 100%; color: white; margin-bottom: 10px; font-size: 14px; }
        .btn-fullscreen { background: var(--accent); color: white; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div id="exportSquare">
        <div class="post-inner">
            <div class="meta-row">
                <div class="tag tag-gray">DAY 068</div>
                <div class="tag tag-gray">18%</div>
                <div class="tag tag-blue">03.09.2026</div>
                <div class="tag tag-blue" style="opacity: 0.8;">@jvhn0gl3</div>
            </div>

            <div class="social-row">
                <div class="social-cell"><i class="fa-brands fa-facebook text-blue-500"></i><i class="fa-brands fa-threads text-white"></i></div>
                <div class="social-cell"><i class="fa-brands fa-youtube text-red-600"></i><i class="fa-brands fa-instagram text-pink-500"></i></div>
            </div>

            <div id="captureArea">
                <div class="content-area">
                    <div id="previewText">CROP SAFE</div>
                </div>
                <div class="internal-footer">
                    @JVHN0GL3 // JOHN-OGLETREE
                </div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <textarea id="inputText" class="input-field h-16">CROP SAFE</textarea>
        <button onclick="toggleFullscreen()" class="btn-fullscreen">Enter Screenshot Mode</button>
    </div>

    <script>
        const previewText = document.getElementById('previewText');
        const inputText = document.getElementById('inputText');
        const exportSquare = document.getElementById('exportSquare');

        function toggleFullscreen() {
            if (!document.fullscreenElement) exportSquare.requestFullscreen();
            else document.exitFullscreen();
        }

        function adjustFontSize() {
            let fontSize = 160; 
            previewText.style.fontSize = fontSize + 'px';
            while ((previewText.scrollHeight > 400 || previewText.scrollWidth > 450) && fontSize > 20) {
                fontSize -= 2;
                previewText.style.fontSize = fontSize + 'px';
            }
        }

        inputText.addEventListener('input', (e) => {
            previewText.innerText = e.target.value;
            adjustFontSize();
        });

        window.addEventListener('load', adjustFontSize);
    </script>
</body>
</html>
