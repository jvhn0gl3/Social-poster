<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio Instagram Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --accent-dark: #1e40af;
            --bg-dark: #05070a;
        }

        body {
            background-color: #111;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Fullscreen: Focused solely on the card */
        #exportSquare:fullscreen {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        /* Instagram Standard 1:1 (Scaled for Preview) */
        #exportSquare {
            width: 540px;
            height: 540px;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.18) 0px, transparent 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
            cursor: pointer;
            flex-shrink: 0;
        }

        #exportSquare::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.07;
            pointer-events: none;
            z-index: 1;
        }

        .post-inner {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .meta-row { display: flex; gap: 6px; }

        .tag {
            height: 24px; 
            padding: 0 10px;
            font-size: 8px; 
            font-weight: 900;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            border-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); }

        .social-header-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 380px;
        }

        .social-cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 14px;
        }

        #captureArea {
            width: 380px; 
            height: 380px; 
            background-color: #0f131f;
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%),
                radial-gradient(circle at 50% 0%, #1e2638 0%, #0f131f 95%);
            border-radius: 44px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.015); }
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            overflow: hidden;
        }

        #previewText {
            line-height: 1.05;
            font-weight: 900;
            color: #ffffff;
            word-wrap: break-word;
            max-width: 100%;
            letter-spacing: -0.05em;
        }

        .footer-premium {
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            border-top: 1px solid rgba(255,255,255,0.05);
            width: 380px;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            border-radius: 12px;
        }

        .footer-part {
            font-size: 8px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .controls-container {
            width: 100%;
            max-width: 540px;
            background: rgba(17, 24, 39, 0.8);
            margin-top: 30px;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
        }

        .input-label {
            color: #60a5fa;
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 14px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .btn-fullscreen {
            background: var(--accent);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            width: 100%;
            margin-top: 15px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-fullscreen:hover { background: var(--accent-dark); transform: translateY(-1px); }
    </style>
</head>
<body>

    <div id="exportSquare" title="Click to exit screenshot mode">
        <div class="post-inner">
            <div class="meta-row">
                <div class="tag tag-gray" id="dayOfYearTag">DAY 068</div>
                <div class="tag tag-gray" id="progressTag">18%</div>
                <div class="tag tag-blue" id="dateTag">03.09.2026</div>
                <div class="tag tag-blue" style="background: var(--accent-dark);" id="handleTag">@jvhn0gl3</div>
            </div>

            <div class="social-header-row">
                <div class="social-cell"><i class="fa-brands fa-facebook text-blue-500"></i><i class="fa-brands fa-threads text-white"></i></div>
                <div class="social-cell"><i class="fa-brands fa-youtube text-red-600"></i><i class="fa-brands fa-instagram text-pink-500"></i></div>
            </div>

            <div id="captureArea">
                <div class="content-area" id="contentArea">
                    <div id="previewText">INSTAGRAM READY</div>
                </div>
            </div>

            <div class="footer-premium">
                <span class="footer-part" id="footerHandle">@JVHN0GL3 // JOHN-OGLETREE</span>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <span class="input-label">Project Date</span>
                <input type="text" id="inputDate" class="input-field" value="03.09.2026">
            </div>
            <div>
                <span class="input-label">Handle</span>
                <input type="text" id="inputHandle" class="input-field" value="@jvhn0gl3">
            </div>
        </div>
        <div>
            <span class="input-label">Message Content</span>
            <textarea id="inputText" class="input-field h-20 resize-none">INSTAGRAM READY</textarea>
        </div>
        
        <button onclick="toggleFullscreen()" class="btn-fullscreen">
            <i class="fa-solid fa-camera"></i> Enter Screenshot Mode
        </button>
    </div>

    <script>
        const elements = {
            dateTag: document.getElementById('dateTag'),
            handleTag: document.getElementById('handleTag'),
            progressTag: document.getElementById('progressTag'),
            dayOfYearTag: document.getElementById('dayOfYearTag'),
            previewText: document.getElementById('previewText'),
            contentArea: document.getElementById('contentArea'),
            inputDate: document.getElementById('inputDate'),
            inputHandle: document.getElementById('inputHandle'),
            inputText: document.getElementById('inputText'),
            footerHandle: document.getElementById('footerHandle'),
            exportSquare: document.getElementById('exportSquare')
        };

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                elements.exportSquare.requestFullscreen().catch(err => {
                    console.error(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        elements.exportSquare.onclick = () => {
            if (document.fullscreenElement) document.exitFullscreen();
        };

        function updateMetrics() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const dayOfYear = Math.floor((now - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
            elements.dayOfYearTag.innerText = `DAY ${dayOfYear.toString().padStart(3, '0')}`;
            
            const endOfYear = new Date(now.getFullYear() + 1, 0, 1);
            const progress = ((now - startOfYear) / (endOfYear - startOfYear)) * 100;
            elements.progressTag.innerText = Math.floor(progress) + '%';
        }

        function adjustFontSize() {
            const container = elements.contentArea;
            const text = elements.previewText;
            let fontSize = 120; 
            text.style.fontSize = fontSize + 'px';

            while ((text.scrollHeight > container.offsetHeight || text.scrollWidth > container.offsetWidth) && fontSize > 12) {
                fontSize--;
                text.style.fontSize = fontSize + 'px';
            }
        }

        updateMetrics();
        setInterval(updateMetrics, 60000);

        elements.inputDate.addEventListener('input', (e) => elements.dateTag.innerText = e.target.value);
        elements.inputHandle.addEventListener('input', (e) => {
            elements.handleTag.innerText = e.target.value;
            elements.footerHandle.innerText = `${e.target.value.toUpperCase()} // JOHN-OGLETREE`;
        });
        elements.inputText.addEventListener('input', (e) => {
            elements.previewText.innerText = e.target.value;
            adjustFontSize();
        });

        window.addEventListener('load', adjustFontSize);
        // Recalculate on fullscreen change to ensure centering
        document.addEventListener('fullscreenchange', adjustFontSize);
    </script>
</body>
</html>
