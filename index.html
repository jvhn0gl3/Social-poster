<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio 1:1 HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body::-webkit-scrollbar { display: none; }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .app-wrapper {
            display: flex;
            flex-direction: row;
            gap: 40px;
            align-items: flex-start;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
        }

        /* 1:1 SQUARE PREVIEW WINDOW 
           The UI displays it at 300px, but it's 800px underneath. */
        .preview-window {
            width: 300px;
            height: 300px;
            flex-shrink: 0;
            position: relative;
            background: #000;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card-scaler {
            transform: scale(0.375); /* Scale 800px down to 300px (300/800 = 0.375) */
            transform-origin: top left;
            width: 800px;
            height: 800px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .card-container {
            width: 800px; 
            height: 800px;
            position: relative;
            overflow: hidden;
            border-radius: 64px;
            background: #000;
            border: 4px solid rgba(255,255,255,0.1);
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
            position: relative;
        }

        /* Safe zone is essentially the whole card in 1:1 */
        .content-zone {
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
        }

        /* --- Mode Logic --- */
        .caption-only-mode .main-media-container { display: none; }
        .caption-only-mode .canvas-area { justify-content: center; text-align: center; }
        .caption-only-mode .header-meta-row { flex-direction: column; align-items: center; gap: 24px; }
        .caption-only-mode .meta-pills { align-items: center; }
        .caption-only-mode .caption-text-area { font-size: 48px; max-height: none; line-height: 1.4; }

        .media-only-mode .caption-text-area { display: none; }
        .media-only-mode .main-media-container { height: 500px; } 
        .media-only-mode .meta-pills { flex-direction: row; align-items: center; gap: 15px; }

        .header-meta-row { display: flex; align-items: flex-start; gap: 30px; width: 100%; }
        .meta-pills { display: flex; flex-direction: column; gap: 12px; }

        .caption-text-area {
            flex: 1;
            font-size: 28px;
            font-weight: 300;
            line-height: 1.35;
            color: rgba(255, 255, 255, 0.95);
            max-height: 200px;
            overflow: hidden;
            word-wrap: break-word;
        }

        .main-media-container {
            width: 100%;
            height: 400px; 
            border-radius: 40px;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: height 0.3s ease;
        }

        .main-media { width: 100%; height: 100%; object-fit: cover; }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 20px;
        }

        .icon-bar-inline {
            display: flex;
            gap: 15px;
            padding: 15px 35px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
        }

        .brand-pill, .date-pill {
            background: #3b82f6;
            color: white;
            border-radius: 100px;
            padding: 8px 24px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .social-icon { font-size: 24px; }

        .controls-panel {
            width: 300px;
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #3b82f6;
            margin: 16px 0 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title:first-child { margin-top: 0; }
        .section-title::after { content: ""; flex-grow: 1; height: 1px; background: #1e293b; }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-size: 12px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            font-size: 11px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary { background: #1e293b; border: 1px solid #334155; }

        .loading-spinner {
            display: none;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        [contenteditable="true"]:focus { outline: none; background: rgba(59, 130, 246, 0.2); border-radius: 12px; }

        @media (max-width: 650px) {
            .app-wrapper { flex-direction: column; align-items: center; }
            .preview-window { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="mb-8 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter">pxltr Studio Square</h1>
        <p class="text-slate-500 text-[9px] uppercase tracking-widest font-bold">1:1 High-Resolution Screenshots</p>
    </div>

    <div class="app-wrapper">
        <!-- 1:1 Square Card -->
        <div class="preview-window">
            <div class="card-scaler">
                <div class="card-container" id="captureCard">
                    <div class="canvas-area" id="mainCanvas">
                        <div class="content-zone">
                            <div class="header-meta-row">
                                <div class="meta-pills">
                                    <div class="date-pill" id="displayDate" contenteditable="true">02.05.2026</div>
                                    <div class="brand-pill uppercase" id="displayHandle" contenteditable="true">@PXTR_SQUARE</div>
                                </div>
                                <div class="caption-text-area" id="displayCaption" contenteditable="true">
                                    Native 800x800 square resolution. Perfect for manual high-quality screenshots.
                                </div>
                            </div>
                            
                            <div class="main-media-container" id="mediaWrapper">
                                <img 
                                    src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=100&w=800" 
                                    id="mainImage" 
                                    class="main-media"
                                >
                                <video id="mainVideo" class="main-media hidden" playsinline loop muted></video>
                            </div>
                        </div>

                        <div class="footer-row">
                            <div class="icon-bar-inline">
                                <i class="fa-brands fa-facebook social-icon" style="color:#1877F2"></i>
                                <i class="fa-brands fa-youtube social-icon" style="color:#ff0000"></i>
                                <i class="fa-brands fa-threads social-icon" style="color:#fff"></i>
                                <i class="fa-brands fa-instagram social-icon" style="color:#E4405F"></i>
                                <i class="fa-brands fa-tiktok social-icon" style="color:#00f2ea"></i>
                            </div>
                            <div class="h-2 w-16 bg-white/20 rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-panel">
            <div class="section-title">Square Modes</div>
            <div class="grid grid-cols-3 gap-1 mb-4">
                <button id="modeStandard" class="btn" onclick="setMode('standard')">Standard</button>
                <button id="modeCaption" class="btn btn-secondary" onclick="setMode('caption')">Text Only</button>
                <button id="modeMedia" class="btn btn-secondary" onclick="setMode('media')">Media Only</button>
            </div>

            <div class="section-title">Visuals</div>
            <button class="btn btn-secondary w-full mb-3" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-upload"></i> Upload Image/Video
            </button>
            <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(event)">

            <div class="flex gap-2">
                <input type="text" id="aiPrompt" placeholder="AI Image Gen..." class="flex-1">
                <button class="btn w-12" id="genImageBtn" onclick="generateAIImage()">
                    <div class="loading-spinner" id="genSpinner"></div>
                    <i class="fa-solid fa-wand-magic-sparkles" id="genIcon"></i>
                </button>
            </div>

            <div class="section-title">Details</div>
            <div class="grid grid-cols-2 gap-2 mb-2">
                <input type="text" id="dateInput" oninput="updateFromInput('dateInput', 'displayDate')">
                <input type="text" id="handleInput" oninput="updateFromInput('handleInput', 'displayHandle')">
            </div>
            <textarea id="captionInput" rows="2" oninput="updateFromInput('captionInput', 'displayCaption')"></textarea>

            <div class="mt-6 p-4 bg-blue-900/20 rounded-xl border border-blue-500/30">
                <p class="text-[10px] text-blue-200 leading-relaxed text-center">
                    <strong>1:1 Optimization:</strong> This square is rendered at high resolution. Screenshot the preview window for sharp results.
                </p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";

        function setMode(mode) {
            const canvas = document.getElementById('mainCanvas');
            const btns = ['modeStandard', 'modeCaption', 'modeMedia'];
            btns.forEach(b => document.getElementById(b).classList.add('btn-secondary'));
            canvas.classList.remove('caption-only-mode', 'media-only-mode');
            
            if (mode === 'caption') {
                canvas.classList.add('caption-only-mode');
                document.getElementById('modeCaption').classList.remove('btn-secondary');
            } else if (mode === 'media') {
                canvas.classList.add('media-only-mode');
                document.getElementById('modeMedia').classList.remove('btn-secondary');
            } else {
                document.getElementById('modeStandard').classList.remove('btn-secondary');
            }
        }

        function updateFromInput(inputId, targetId) {
            document.getElementById(targetId).innerText = document.getElementById(inputId).value;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const imageEl = document.getElementById('mainImage');
            const videoEl = document.getElementById('mainVideo');
            if (file.type.startsWith('video/')) {
                imageEl.classList.add('hidden');
                videoEl.classList.remove('hidden');
                videoEl.src = URL.createObjectURL(file);
                videoEl.play();
            } else {
                videoEl.classList.add('hidden');
                imageEl.classList.remove('hidden');
                const reader = new FileReader();
                reader.onload = (e) => { imageEl.src = e.target.result; };
                reader.readAsDataURL(file);
            }
        }

        async function generateAIImage() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) return;
            const btn = document.getElementById('genImageBtn'), spinner = document.getElementById('genSpinner'), icon = document.getElementById('genIcon');
            btn.disabled = true; spinner.style.display = 'block'; icon.style.display = 'none';

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ instances: [{ prompt: prompt }], parameters: { sampleCount: 1 } })
                });
                const data = await response.json();
                if (data.predictions?.[0]?.bytesBase64Encoded) {
                    document.getElementById('mainVideo').classList.add('hidden');
                    const img = document.getElementById('mainImage');
                    img.classList.remove('hidden');
                    img.src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                }
            } catch (err) { console.error(err); } 
            finally { btn.disabled = false; spinner.style.display = 'none'; icon.style.display = 'block'; }
        }

        document.querySelectorAll('[contenteditable="true"]').forEach(el => {
            el.addEventListener('input', () => {
                const inputMap = { 'displayDate': 'dateInput', 'displayHandle': 'handleInput', 'displayCaption': 'captionInput' };
                if (inputMap[el.id]) document.getElementById(inputMap[el.id]).value = el.innerText;
            });
        });

        window.onload = () => {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}.${now.getFullYear()}`;
            document.getElementById('displayDate').innerText = dateStr;
            document.getElementById('dateInput').value = dateStr;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText;
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText;
        };
    </script>
</body>
</html>
