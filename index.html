<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            background-color: #0a0e1a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .preview-card {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #161b30, #0f1324);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .tag {
            background: #2563eb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 8px;
        }

        .tag-progress {
            background: rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .text-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        #previewText {
            font-size: 24px;
            line-height: 1.4;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            margin-top: 20px;
            color: #e2e8f0;
            word-wrap: break-word;
        }

        .social-bar {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 16px;
            border-radius: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            width: fit-content;
        }

        .social-bar i {
            font-size: 0.9rem;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            margin-top: 40px;
            border-radius: 30px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 50px;
        }

        .input-field {
            background: #161b30;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            color: white;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .section-label {
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            padding: 14px;
            border-radius: 14px;
            font-weight: 800;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1 class="text-3xl font-black italic mb-1">pxltr Studio Square</h1>
    <p class="text-[10px] tracking-[3px] text-gray-500 font-bold mb-8 uppercase">1:1 High-Resolution Screenshots</p>

    <!-- Preview Card -->
    <div class="preview-card" id="captureArea">
        <div class="text-container" id="textContainer">
            <div class="flex gap-2 justify-center">
                <!-- Year Progress Tag -->
                <span class="tag tag-progress" id="progressTag">0%</span>
                <span class="tag" id="dateTag">02.24.2026</span>
                <span class="tag" id="handleTag">@PXTR30</span>
            </div>
            <div id="previewText">
                High-resolution text-only layouts for maximum impact.
            </div>
        </div>

        <div class="flex justify-center items-center mt-4">
            <div class="social-bar">
                <i class="fa-brands fa-facebook text-blue-500"></i>
                <i class="fa-brands fa-threads text-white"></i>
                <i class="fa-brands fa-tumblr text-blue-400"></i>
                <i class="fa-brands fa-reddit-alien text-orange-500"></i>
                <i class="fa-brands fa-discord text-indigo-400"></i>
                <i class="fa-brands fa-snapchat text-yellow-400"></i>
                <i class="fa-brands fa-tiktok text-cyan-400"></i>
                <i class="fa-brands fa-youtube text-red-600"></i>
                <i class="fa-brands fa-instagram text-pink-500"></i>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-container">
        <div class="section-label">Details</div>
        <div class="flex gap-2">
            <input type="text" id="inputDate" class="input-field" value="02.24.2026" placeholder="Date">
            <input type="text" id="inputHandle" class="input-field" value="@PXTR30" placeholder="Handle">
        </div>
        
        <div class="section-label">Content</div>
        <textarea id="inputText" class="input-field h-32 resize-none" placeholder="Enter your text here...">High-resolution text-only layouts for maximum impact.</textarea>

        <div class="section-label mt-4">Export</div>
        <button onclick="captureCard()" class="btn-primary">
            <i class="fas fa-camera"></i> Capture PNG
        </button>
    </div>

    <script>
        const elements = {
            dateTag: document.getElementById('dateTag'),
            handleTag: document.getElementById('handleTag'),
            progressTag: document.getElementById('progressTag'),
            previewText: document.getElementById('previewText'),
            inputDate: document.getElementById('inputDate'),
            inputHandle: document.getElementById('inputHandle'),
            inputText: document.getElementById('inputText'),
            captureArea: document.getElementById('captureArea')
        };

        // Year Progress Calculation
        function updateYearProgress() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const end = new Date(now.getFullYear() + 1, 0, 1);
            const progress = ((now - start) / (end - start)) * 100;
            elements.progressTag.innerText = progress.toFixed(0) + '%';
        }

        // Initialize progress
        updateYearProgress();

        elements.inputDate.addEventListener('input', (e) => elements.dateTag.innerText = e.target.value);
        elements.inputHandle.addEventListener('input', (e) => elements.handleTag.innerText = e.target.value);
        elements.inputText.addEventListener('input', (e) => elements.previewText.innerText = e.target.value);

        async function captureCard() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Generating...';
            btn.disabled = true;

            try {
                const canvas = await html2canvas(elements.captureArea, {
                    scale: 3,
                    backgroundColor: null,
                    useCORS: true,
                    logging: false,
                });

                const link = document.createElement('a');
                link.download = `pxltr-studio-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error("Capture failed:", err);
                showToast("Capture failed. Try again.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showToast(msg) {
            const errorBox = document.createElement('div');
            errorBox.className = "fixed bottom-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-lg z-50 transition-all";
            errorBox.innerText = msg;
            document.body.appendChild(errorBox);
            setTimeout(() => {
                errorBox.style.opacity = '0';
                setTimeout(() => errorBox.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
