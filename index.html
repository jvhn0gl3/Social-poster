<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio - Universal Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --bg-dark: #05070a;
            --card-bg: rgba(15, 19, 31, 0.85);
        }

        body {
            background-color: #0b0e14;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #exportSquare:fullscreen {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        #exportSquare {
            width: 1000px; 
            height: 1000px;
            zoom: 0.5; 
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Reactive Themes */
        .theme-default { background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.3) 0px, transparent 50%); }
        .theme-art { background-image: radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.3) 0px, transparent 50%); }
        .theme-success { background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.3) 0px, transparent 50%); }
        .theme-alert { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(220, 38, 38, 0.3) 0px, transparent 50%); }
        .theme-minimal { background-image: radial-gradient(at 0% 0%, rgba(255, 255, 255, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(255, 255, 255, 0.05) 0px, transparent 50%); }

        .post-inner {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .meta-row { display: flex; gap: 8px; }
        .tag {
            height: 32px; padding: 0 12px; font-size: 11px; font-weight: 900;
            display: flex; align-items: center; text-transform: uppercase;
            border-radius: 6px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); }

        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 550px; }
        .social-cell {
            background: rgba(255, 255, 255, 0.03); border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px;
            display: flex; justify-content: space-around; font-size: 20px;
        }

        #captureArea {
            width: 550px; height: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 60px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .content-area {
            flex-grow: 1; display: flex; align-items: center;
            justify-content: center; text-align: center; padding: 50px;
        }

        #previewText { font-weight: 900; color: #ffffff; letter-spacing: -0.05em; line-height: 1; }

        .internal-footer {
            width: 100%; padding: 25px 0; border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center; font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Advanced Controls */
        .controls-container {
            width: 500px; background: rgba(17, 24, 39, 0.95); margin-top: 20px;
            border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-field { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; width: 100%; color: white; font-size: 13px; outline: none; transition: border 0.3s; }
        .input-field:focus { border-color: var(--accent); }
        .label { font-size: 10px; font-weight: 800; color: #60a5fa; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .btn-blue { background: var(--accent); color: white; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        
        #copyToast {
            position: fixed; bottom: 20px; background: #10b981; color: white;
            padding: 10px 25px; border-radius: 30px; font-weight: 700;
            transform: translateY(100px); transition: transform 0.3s;
            z-index: 100; font-size: 12px;
        }
    </style>
</head>
<body class="theme-default">

    <div id="copyToast">TEXT COPIED!</div>

    <div id="exportSquare" class="theme-default">
        <div class="post-inner">
            <div class="meta-row">
                <div class="tag tag-gray" id="tagDay">DAY 068</div>
                <div class="tag tag-gray" id="tagProgress">18%</div>
                <div class="tag tag-blue" id="tagDate">03.09.2026</div>
                <div class="tag tag-blue" id="tagHandle" style="opacity: 0.8;">@USER</div>
            </div>

            <div class="social-row">
                <div class="social-cell"><i class="fa-brands fa-facebook text-blue-500"></i><i class="fa-brands fa-threads text-white"></i></div>
                <div class="social-cell"><i class="fa-brands fa-youtube text-red-600"></i><i class="fa-brands fa-instagram text-pink-500"></i></div>
            </div>

            <div id="captureArea">
                <div class="content-area">
                    <div id="previewText">UNIVERSAL MODE</div>
                </div>
                <div class="internal-footer" id="footerText">@USER // FULL NAME</div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <div class="control-row">
            <div>
                <span class="label">Handle</span>
                <input type="text" id="inHandle" class="input-field" value="@jvhn0gl3">
            </div>
            <div>
                <span class="label">Full Name</span>
                <input type="text" id="inName" class="input-field" value="John-Ogletree">
            </div>
        </div>
        <div class="control-row">
            <div>
                <span class="label">Date</span>
                <input type="text" id="inDate" class="input-field" value="03.09.2026">
            </div>
            <div>
                <span class="label">Day # / Progress</span>
                <div class="flex gap-2">
                    <input type="text" id="inDayNum" class="input-field w-1/2" value="068">
                    <input type="text" id="inProg" class="input-field w-1/2" value="18%">
                </div>
            </div>
        </div>
        <span class="label">Main Message</span>
        <textarea id="inText" class="input-field h-16" placeholder="Vibe check...">UNIVERSAL MODE</textarea>
        
        <button onclick="prepAndFullscreen()" class="btn-blue">
            <i class="fa-solid fa-camera"></i> Prepare Screenshot
        </button>
    </div>

    <script>
        const els = {
            pText: document.getElementById('previewText'),
            iText: document.getElementById('inText'),
            iHandle: document.getElementById('inHandle'),
            iName: document.getElementById('inName'),
            iDate: document.getElementById('inDate'),
            iDay: document.getElementById('inDayNum'),
            iProg: document.getElementById('inProg'),
            tDay: document.getElementById('tagDay'),
            tProg: document.getElementById('tagProgress'),
            tDate: document.getElementById('tagDate'),
            tHandle: document.getElementById('tagHandle'),
            fText: document.getElementById('footerText'),
            sq: document.getElementById('exportSquare'),
            toast: document.getElementById('copyToast')
        };

        const themes = {
            art: ['design', 'art', 'style', 'love', 'creative', 'heart'],
            success: ['success', 'win', 'green', 'done', 'go', 'finished'],
            alert: ['alert', 'warning', 'fire', 'stop', 'hot', 'error'],
            minimal: ['minimal', 'black', 'white', 'simple', 'clean']
        };

        function updateAll() {
            // Update UI Elements
            els.pText.innerText = els.iText.value;
            els.tDay.innerText = `DAY ${els.iDay.value}`;
            els.tProg.innerText = els.iProg.value;
            els.tDate.innerText = els.iDate.value;
            els.tHandle.innerText = els.iHandle.value;
            els.fText.innerText = `${els.iHandle.value} // ${els.iName.value}`;

            // Handle Font Scaling
            let fontSize = 160; 
            els.pText.style.fontSize = fontSize + 'px';
            while ((els.pText.scrollHeight > 400 || els.pText.scrollWidth > 450) && fontSize > 20) {
                fontSize -= 2;
                els.pText.style.fontSize = fontSize + 'px';
            }

            // Handle Background Logic
            const lowerText = els.iText.value.toLowerCase();
            let theme = 'theme-default';
            if (themes.art.some(w => lowerText.includes(w))) theme = 'theme-art';
            else if (themes.success.some(w => lowerText.includes(w))) theme = 'theme-success';
            else if (themes.alert.some(w => lowerText.includes(w))) theme = 'theme-alert';
            else if (themes.minimal.some(w => lowerText.includes(w))) theme = 'theme-minimal';
            els.sq.className = theme;
        }

        async function prepAndFullscreen() {
            await navigator.clipboard.writeText(els.iText.value);
            els.toast.style.transform = 'translateY(0)';
            setTimeout(() => els.toast.style.transform = 'translateY(100px)', 2000);
            if (!document.fullscreenElement) els.sq.requestFullscreen();
        }

        [els.iText, els.iHandle, els.iName, els.iDate, els.iDay, els.iProg].forEach(input => {
            input.addEventListener('input', updateAll);
        });

        window.addEventListener('load', updateAll);
    </script>
</body>
</html>
