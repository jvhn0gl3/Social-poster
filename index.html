<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card-container {
            width: 320px; 
            height: 540px; 
            position: relative;
            overflow: hidden;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 6px solid #1e293b;
            background: #000;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .header-meta-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 1px; 
            width: 100%;
        }

        .main-image-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            min-height: 220px; 
            max-height: 220px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: object-fit 0.3s ease;
        }

        .show-full-image {
            object-fit: contain !important;
        }

        .caption-area {
            margin-top: 1px; 
            padding: 0 12px;
            font-size: 12px;
            font-weight: 300;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            min-height: 60px; 
            text-align: center;
        }

        .icon-bar-inline {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-pill, .date-pill {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            padding: 4px 8px;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 0.1em;
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        .controls-panel {
            margin-top: 40px;
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after, .section-title::before {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: block;
            width: 100%;
            font-size: 14px;
        }

        .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #1e293b; border: 1px solid #334155; }
        .btn-magic { background: linear-gradient(135deg, #6366f1, #a855f7); }

        #dropOverlay {
            position: absolute;
            inset: 0;
            background: rgba(59, 130, 246, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #94a3b8;
            cursor: pointer;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .photo-grid {
            display: grid;
            grid-template-cols: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        .photo-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .photo-item:hover {
            border-color: #3b82f6;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="mb-8 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter">pxltr Studio</h1>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Universal Asset Replacer</p>
    </div>

    <!-- The Card -->
    <div class="card-container" id="captureCard">
        <div id="dropOverlay" class="text-white font-black text-xl italic uppercase">Drop Image</div>
        <div class="canvas-area" id="cardCanvas">
            <div class="header-meta-row">
                <div class="date-pill" id="displayDate" contenteditable="true">01.22.2026</div>
                <div class="brand-pill uppercase" id="displayHandle" contenteditable="true">@PXTR30</div>
                <div class="icon-bar-inline">
                    <i class="fa-brands fa-youtube" style="color:#ff0000"></i>
                    <i class="fa-brands fa-instagram" style="color:#ff4d4d"></i>
                    <i class="fa-brands fa-threads" style="color:#fff"></i>
                    <i class="fa-brands fa-facebook-f" style="color:#1877F2"></i>
                </div>
            </div>
            
            <div class="main-image-container">
                <img 
                    src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600" 
                    id="mainImage" 
                    class="main-image"
                >
            </div>

            <div class="caption-area" id="displayCaption" contenteditable="true">
                Visions of a digital dreamscape. Exploring the boundaries between reality and the artificial neon glare of the future.
            </div>

            <div class="h-1 w-10 bg-white/20 rounded-full mt-6"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-panel">
        
        <div class="section-title">Visual Assets</div>
        
        <div class="input-group">
            <div class="flex justify-between items-end mb-2">
                <label class="input-label mb-0">Image Upload</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="fitMode" onchange="toggleFitMode()" checked> 
                    <span>Show Entire Image</span>
                </label>
            </div>
            <div class="flex gap-2 mb-2">
                <button class="btn btn-secondary flex-1 flex items-center justify-center gap-2" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-upload text-xs"></i> Local Upload
                </button>
                <button class="btn bg-blue-600/20 text-blue-400 border border-blue-600/30 flex-1 flex items-center justify-center gap-2" onclick="openPhotoHelper()">
                    <i class="fa-brands fa-google text-xs"></i> Google Photos
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
            </div>
        </div>

        <div id="photoHelper" class="hidden bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-bold uppercase text-blue-400">Photos Helper</span>
                <button onclick="closePhotoHelper()" class="text-slate-500 hover:text-white">&times;</button>
            </div>
            <div class="flex gap-2">
                <input type="text" id="photoQuery" placeholder="Search for a subject..." class="flex-1 bg-slate-800">
                <button class="btn w-12 p-0" id="searchPhotosBtn" onclick="searchGooglePhotos()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <div id="photoResults" class="photo-grid"></div>
        </div>

        <div class="input-group">
            <label class="input-label">Image Source URL</label>
            <input type="text" id="imgSrcInput" placeholder="Paste image link here..." oninput="updateFromInput('imgSrcInput', 'mainImage', 'src')">
        </div>

        <div class="section-title mt-4">Meta Information</div>

        <div class="grid grid-cols-2 gap-4">
            <div class="input-group">
                <label class="input-label">Date</label>
                <input type="text" id="dateInput" placeholder="MM.DD.YYYY" oninput="updateFromInput('dateInput', 'displayDate', 'innerText')">
            </div>
            <div class="input-group">
                <label class="input-label">Handle</label>
                <div class="flex gap-1">
                    <input type="text" id="handleInput" placeholder="@handle" oninput="updateFromInput('handleInput', 'displayHandle', 'innerText')">
                    <button class="btn w-10 p-0 text-xs btn-secondary" onclick="generateHandle()" title="✨ Generate handle">✨</button>
                </div>
            </div>
        </div>

        <div class="input-group">
            <div class="flex justify-between items-end mb-1">
                <label class="input-label mb-0">Lower Caption</label>
                <button class="text-[10px] font-bold text-indigo-400 hover:text-indigo-300" onclick="speakCaption()">
                    <i class="fa-solid fa-volume-high"></i> Listen ✨
                </button>
            </div>
            <div class="relative">
                <textarea id="captionInput" rows="2" placeholder="Write your caption..." oninput="updateFromInput('captionInput', 'displayCaption', 'innerText')"></textarea>
                <button class="absolute bottom-2 right-2 btn w-auto px-3 py-1 text-[10px] btn-magic" onclick="rewriteCaption()">✨ Optimize</button>
            </div>
        </div>

        <div class="section-title mt-4">AI Magic</div>
        
        <div class="input-group">
            <label class="input-label">AI Image Prompt</label>
            <div class="flex gap-2">
                <input type="text" id="aiPrompt" placeholder="Surreal mountain peak...">
                <button class="btn w-24" id="genImageBtn" onclick="generateAIImage()">
                    <div class="loading-spinner" id="genSpinner"></div>
                    <span id="genText">Create</span>
                </button>
            </div>
        </div>

        <button class="btn bg-slate-800 hover:bg-slate-700 mt-4" onclick="downloadInfo()">Print Card Config</button>
    </div>

    <script>
        const apiKey = "";

        // --- CORE UI FUNCTIONS ---

        function toggleFitMode() {
            const isFit = document.getElementById('fitMode').checked;
            const img = document.getElementById('mainImage');
            if (isFit) {
                img.classList.add('show-full-image');
            } else {
                img.classList.remove('show-full-image');
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('mainImage');
                    img.src = e.target.result;
                    img.classList.add('show-full-image');
                    document.getElementById('fitMode').checked = true;
                    document.getElementById('imgSrcInput').value = `[Uploaded: ${file.name}]`;
                };
                reader.readAsDataURL(file);
            }
        }

        function openPhotoHelper() {
            document.getElementById('photoHelper').classList.remove('hidden');
        }

        function closePhotoHelper() {
            document.getElementById('photoHelper').classList.add('hidden');
        }

        function selectPhoto(url) {
            const img = document.getElementById('mainImage');
            img.src = url;
            img.classList.add('show-full-image');
            document.getElementById('fitMode').checked = true;
            document.getElementById('imgSrcInput').value = url;
            closePhotoHelper();
        }

        function updateFromInput(inputId, targetId, property) {
            const val = document.getElementById(inputId).value;
            const target = document.getElementById(targetId);
            if (property === 'src') {
                target.src = val || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600";
            } else {
                target.innerText = val;
            }
        }

        // --- GEMINI API INTEGRATIONS ---

        async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
                await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
            }
        }

        async function searchGooglePhotos() {
            const query = document.getElementById('photoQuery').value;
            if (!query) return;
            
            const btn = document.getElementById('searchPhotosBtn');
            const resultsDiv = document.getElementById('photoResults');
            btn.disabled = true;
            resultsDiv.innerHTML = '<div class="col-span-3 py-4 text-center text-xs opacity-50">Searching...</div>';

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: `Find 6 high quality direct image URLs (from Unsplash or Pexels) for: ${query}. Return ONLY a JSON array of strings.` }] 
                        }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const urls = JSON.parse(response.candidates?.[0]?.content?.parts?.[0]?.text || "[]");
                renderPhotos(urls.length ? urls : []);
            } catch (err) {
                console.error(err);
                resultsDiv.innerHTML = '<div class="col-span-3 py-4 text-center text-xs text-red-400">Error connecting.</div>';
            } finally {
                btn.disabled = false;
            }
        }

        function renderPhotos(urls) {
            const resultsDiv = document.getElementById('photoResults');
            resultsDiv.innerHTML = '';
            if(!urls.length) {
                resultsDiv.innerHTML = '<div class="col-span-3 py-4 text-center text-xs opacity-50">No results found.</div>';
                return;
            }
            urls.slice(0, 6).forEach(url => {
                const div = document.createElement('div');
                div.className = 'photo-item';
                div.onclick = () => selectPhoto(url);
                div.innerHTML = `<img src="${url}" onerror="this.src='https://via.placeholder.com/150?text=No+Preview'">`;
                resultsDiv.appendChild(div);
            });
        }

        async function generateAIImage() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) return;

            const btn = document.getElementById('genImageBtn');
            const spinner = document.getElementById('genSpinner');
            const text = document.getElementById('genText');

            btn.disabled = true;
            spinner.style.display = 'block';
            text.style.display = 'none';

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        instances: { prompt: prompt },
                        parameters: { sampleCount: 1 }
                    })
                });

                if (data.predictions?.[0]?.bytesBase64Encoded) {
                    const base64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    const img = document.getElementById('mainImage');
                    img.src = base64;
                    img.classList.add('show-full-image');
                    document.getElementById('fitMode').checked = true;
                    document.getElementById('imgSrcInput').value = "[AI Generated]";
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                text.style.display = 'inline';
            }
        }

        async function rewriteCaption() {
            const current = document.getElementById('captionInput').value || document.getElementById('displayCaption').innerText;
            const btn = event.currentTarget;
            const oldText = btn.innerText;
            btn.innerText = "✨ Thinking...";
            btn.disabled = true;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Rewrite this short social media caption to be more engaging, poetic, and trendy: "${current}". Return only the rewritten text, no quotes.` }] }]
                    })
                });

                const newText = response.candidates?.[0]?.content?.parts?.[0]?.text;
                if (newText) {
                    document.getElementById('captionInput').value = newText;
                    document.getElementById('displayCaption').innerText = newText;
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerText = oldText;
                btn.disabled = false;
            }
        }

        async function generateHandle() {
            const current = document.getElementById('displayCaption').innerText;
            const btn = event.currentTarget;
            btn.innerText = "...";
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Based on this aesthetic: "${current}", suggest 1 short, cool, minimalist social media handle starting with @. Return ONLY the handle.` }] }]
                    })
                });

                const newHandle = response.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                if (newHandle) {
                    document.getElementById('handleInput').value = newHandle;
                    document.getElementById('displayHandle').innerText = newHandle;
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerText = "✨";
            }
        }

        async function speakCaption() {
            const text = document.getElementById('displayCaption').innerText;
            const btn = event.currentTarget;
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading ✨';

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say smoothly and sophisticatedly: ${text}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        }
                    })
                });

                const base64Audio = response.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (base64Audio) {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const audioBuffer = base64ToUint8Array(base64Audio);
                    const wavBuffer = pcmToWav(audioBuffer, 24000); // 24kHz is default for this model
                    const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(blob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerHTML = oldHtml;
            }
        }

        function base64ToUint8Array(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes;
        }

        function pcmToWav(pcmData, sampleRate) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            const mono = true;

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, mono ? 1 : 2, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * (mono ? 1 : 2) * 2, true);
            view.setUint16(32, (mono ? 1 : 2) * 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmData.length, true);

            const combined = new Uint8Array(header.byteLength + pcmData.byteLength);
            combined.set(new Uint8Array(header), 0);
            combined.set(new Uint8Array(pcmData), header.byteLength);
            return combined;
        }

        function downloadInfo() {
            const config = {
                handle: document.getElementById('displayHandle').innerText,
                date: document.getElementById('displayDate').innerText,
                caption: document.getElementById('displayCaption').innerText,
                image: document.getElementById('mainImage').src.substring(0, 50) + "..."
            };
            console.log("Card Config:", config);
        }

        window.onload = () => {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}.${now.getFullYear()}`;
            document.getElementById('displayDate').innerText = dateStr;
            document.getElementById('dateInput').value = dateStr;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText;
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText;
            toggleFitMode();
        };
    </script>
</body>
</html>
