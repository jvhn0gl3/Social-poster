<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio - Vertical Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --bg-dark: #05070a;
            --card-bg: rgba(15, 19, 31, 0.95);
        }

        body {
            background-color: #0b0e14;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #exportSquare:fullscreen {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        #exportSquare {
            width: 1000px; 
            height: 1000px;
            zoom: 0.5; 
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Themes */
        .theme-default { background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.2) 0px, transparent 50%); }
        .theme-art { background-image: radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.2) 0px, transparent 50%); }
        .theme-success { background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.2) 0px, transparent 50%); }
        .theme-alert { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(220, 38, 38, 0.2) 0px, transparent 50%); }
        .theme-minimal { background-image: radial-gradient(at 0% 0%, rgba(255, 255, 255, 0.05) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(255, 255, 255, 0.02) 0px, transparent 50%); }

        .post-inner { 
            z-index: 2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 25px; 
        }

        .meta-row { display: flex; gap: 8px; }
        
        [contenteditable="true"] {
            outline: none;
            cursor: text;
            transition: opacity 0.2s;
        }
        [contenteditable="true"]:hover { opacity: 0.8; background: rgba(255,255,255,0.05); border-radius: 4px; }

        .tag {
            height: 32px; padding: 0 12px; font-size: 11px; font-weight: 900;
            display: flex; align-items: center; text-transform: uppercase;
            border-radius: 6px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); }

        /* Sidebar Social List - Vertical Only */
        .social-sidebar { 
            display: flex;
            flex-direction: column; 
            gap: 8px; 
            padding: 20px 15px;
            border-right: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.3);
            height: 100%;
            justify-content: center;
        }
        
        .social-cell {
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08); 
            width: 44px;
            height: 44px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        #captureArea {
            width: 750px; 
            height: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            border-radius: 50px;
            display: flex;
            flex-direction: row; 
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .content-area {
            flex-grow: 1; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            text-align: center; 
            padding: 40px 60px;
        }

        #previewText { 
            font-weight: 900; 
            color: #ffffff; 
            letter-spacing: -0.05em; 
            line-height: 1.1; 
            width: 100%; 
            word-wrap: break-word;
        }

        .internal-footer {
            width: 100%; 
            padding: 20px 0; 
            border-top: 1px solid rgba(255,255,255,0.08);
            text-align: center; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; 
            color: rgba(255,255,255,0.3); 
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .controls-container {
            width: 400px; background: rgba(17, 24, 39, 0.95); margin-top: 20px;
            border-radius: 20px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .btn-blue { background: var(--accent); color: white; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #copyToast {
            position: fixed; bottom: 20px; background: #10b981; color: white;
            padding: 10px 25px; border-radius: 30px; font-weight: 700;
            transform: translateY(100px); transition: transform 0.3s;
            z-index: 100; font-size: 12px;
        }
    </style>
</head>
<body class="theme-default">

    <div id="copyToast">TEXT COPIED!</div>

    <div id="exportSquare" class="theme-default">
        <div class="post-inner">
            <div class="meta-row">
                <div class="tag tag-gray" contenteditable="true">DAY 068</div>
                <div class="tag tag-gray" contenteditable="true">18%</div>
                <div class="tag tag-blue" contenteditable="true">03.09.2026</div>
                <div class="tag tag-blue" contenteditable="true" style="opacity: 0.8;">@jvhn0gl3</div>
            </div>

            <div id="captureArea">
                <!-- Social Sidebar (Vertical Column Only) -->
                <div class="social-sidebar">
                    <div class="social-cell"><i class="fa-brands fa-facebook text-[#1877F2]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-youtube text-[#FF0000]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-tiktok text-white"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-snapchat text-[#FFFC00]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-instagram text-[#E4405F]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-threads text-white"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-discord text-[#5865F2]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-tumblr text-[#36465D]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-x-twitter text-white"></i></div>
                </div>

                <!-- Main Text Content -->
                <div class="main-content">
                    <div class="content-area">
                        <div id="previewText" contenteditable="true">The 7-hour human patience test is now up on the jvhn0gl3 YouTube channel. 🌳💀🍿</div>
                    </div>
                    <div class="internal-footer" contenteditable="true">@JVHN0GL3 // JOHN-OGLETREE</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <p class="text-gray-400 text-xs mb-4">Vertical-only sidebar layout. Content is editable.</p>
        <button onclick="prepAndFullscreen()" class="btn-blue">
            <i class="fa-solid fa-camera"></i> Prepare Screenshot
        </button>
    </div>

    <script>
        const pText = document.getElementById('previewText');
        const sq = document.getElementById('exportSquare');
        const toast = document.getElementById('copyToast');

        const themes = {
            art: ['design', 'art', 'style', 'love', 'creative', 'heart'],
            success: ['success', 'win', 'green', 'done', 'go', 'finished', 'focus'],
            alert: ['alert', 'warning', 'fire', 'stop', 'hot', 'error', 'youtube', 'quit', 'delete', 'remove'],
            minimal: ['minimal', 'black', 'white', 'simple', 'clean']
        };

        function adjustFontSize() {
            let fontSize = 90; 
            pText.style.fontSize = fontSize + 'px';
            const container = pText.parentElement;
            
            while ((pText.scrollHeight > container.offsetHeight - 40 || pText.scrollWidth > container.offsetWidth - 40) && fontSize > 20) {
                fontSize -= 1;
                pText.style.fontSize = fontSize + 'px';
            }
        }

        function updateBackground() {
            const lowerText = pText.innerText.toLowerCase();
            let theme = 'theme-default';
            if (themes.art.some(w => lowerText.includes(w))) theme = 'theme-art';
            else if (themes.success.some(w => lowerText.includes(w))) theme = 'theme-success';
            else if (themes.alert.some(w => lowerText.includes(w))) theme = 'theme-alert';
            else if (themes.minimal.some(w => lowerText.includes(w))) theme = 'theme-minimal';
            sq.className = theme;
        }

        async function prepAndFullscreen() {
            try {
                const textToCopy = pText.innerText;
                const hiddenInput = document.createElement('textarea');
                hiddenInput.value = textToCopy;
                document.body.appendChild(hiddenInput);
                hiddenInput.select();
                document.execCommand('copy');
                document.body.removeChild(hiddenInput);

                toast.style.transform = 'translateY(0)';
                setTimeout(() => toast.style.transform = 'translateY(100px)', 2000);
            } catch (e) {
                console.log("Clipboard fallback active");
            }
            
            if (!document.fullscreenElement) {
                sq.requestFullscreen().catch(err => {
                    console.log(`Fullscreen failed: ${err.message}`);
                });
            }
        }

        pText.addEventListener('input', () => {
            updateBackground();
            adjustFontSize();
        });

        document.querySelectorAll('[contenteditable]').forEach(el => {
            el.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });
        });

        window.addEventListener('load', () => {
            adjustFontSize();
            updateBackground();
        });
    </script>
</body>
</html>
