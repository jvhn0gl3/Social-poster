<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio - Perfectly Centered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --bg-dark: #05070a;
            --card-bg: rgba(15, 19, 31, 0.98);
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #exportSquare:fullscreen {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        /* 1:1 Aspect Ratio Box */
        #exportSquare {
            width: 1000px; 
            height: 1000px;
            zoom: 0.5; 
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Themes */
        .theme-default { background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.15) 0px, transparent 50%); }
        .theme-art { background-image: radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.2) 0px, transparent 50%); }
        .theme-success { background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.2) 0px, transparent 50%); }
        .theme-alert { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(220, 38, 38, 0.2) 0px, transparent 50%); }

        .post-inner { 
            z-index: 2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 25px; 
            width: 100%;
        }

        .meta-row { display: flex; gap: 8px; margin-bottom: 5px; }
        
        [contenteditable="true"] { outline: none; }

        .tag {
            height: 28px; padding: 0 10px; font-size: 10px; font-weight: 900;
            display: flex; align-items: center; text-transform: uppercase;
            border-radius: 4px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); }

        /* Social Sidebar - Bold and Vertical */
        .social-sidebar { 
            display: flex;
            flex-direction: column; 
            gap: 10px; 
            padding: 30px 24px;
            border-right: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.3);
            height: 100%;
            justify-content: center;
        }
        
        .social-cell {
            width: 56px;
            height: 56px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 26px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* Rounded Main Card */
        #captureArea {
            width: 880px; 
            height: 720px;
            background: var(--card-bg);
            border-radius: 70px;
            display: flex;
            flex-direction: row; 
            overflow: hidden;
            box-shadow: 0 60px 120px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .content-area {
            flex-grow: 1; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 40px 80px;
            overflow: hidden;
        }

        #previewText { 
            font-weight: 900; 
            color: #ffffff; 
            letter-spacing: -0.04em; 
            line-height: 1.1; 
            width: 100%; 
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            white-space: pre-wrap;
        }

        .internal-footer {
            width: 100%; 
            padding: 24px 0; 
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; 
            color: rgba(255,255,255,0.2); 
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .controls-container {
            width: 300px; margin-top: 20px;
            text-align: center;
        }
        .btn-blue { background: var(--accent); color: white; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; font-size: 12px; }
        
        #copyToast {
            position: fixed; bottom: 20px; background: #10b981; color: white;
            padding: 10px 25px; border-radius: 30px; font-weight: 700;
            transform: translateY(100px); transition: transform 0.3s;
            z-index: 100; font-size: 12px;
        }
    </style>
</head>
<body class="theme-default">

    <div id="copyToast">TEXT COPIED!</div>

    <div id="exportSquare" class="theme-default">
        <div class="post-inner">
            <!-- Meta Tags centered above -->
            <div class="meta-row">
                <div class="tag tag-gray" contenteditable="true">DAY 068</div>
                <div class="tag tag-gray" contenteditable="true">18%</div>
                <div class="tag tag-blue" contenteditable="true">03.09.2026</div>
                <div class="tag tag-blue" contenteditable="true">@jvhn0gl3</div>
            </div>

            <div id="captureArea">
                <!-- Vertical Social Sidebar -->
                <div class="social-sidebar">
                    <div class="social-cell"><i class="fa-brands fa-facebook text-[#1877F2]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-youtube text-[#FF0000]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-tiktok text-white"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-snapchat text-[#FFFC00]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-instagram text-[#E4405F]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-threads text-white"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-discord text-[#5865F2]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-tumblr text-[#36465D]"></i></div>
                    <div class="social-cell"><i class="fa-brands fa-x-twitter text-white"></i></div>
                </div>

                <div class="main-content">
                    <div class="content-area">
                        <!-- Content Text Strictly Centered -->
                        <div id="previewText" contenteditable="true">"Where'd your depth go?"

It didn't go anywhere. Life just got loud.</div>
                    </div>
                    <div class="internal-footer" contenteditable="true">@JVHN0GL3 // JOHN-OGLETREE</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <button onclick="prepAndFullscreen()" class="btn-blue">
            Prepare Square Screenshot
        </button>
    </div>

    <script>
        const pText = document.getElementById('previewText');
        const sq = document.getElementById('exportSquare');
        const toast = document.getElementById('copyToast');

        const themes = {
            art: ['design', 'art', 'style', 'love', 'creative', 'depth'],
            success: ['success', 'win', 'green', 'done'],
            alert: ['alert', 'warning', 'fire', 'stop', 'hot', 'error', 'quit', 'delete', 'loud']
        };

        function adjustFontSize() {
            let fontSize = 90; 
            pText.style.fontSize = fontSize + 'px';
            const container = pText.parentElement;
            
            // Constrain font size so text stays centered and within safe margins
            while ((pText.scrollHeight > container.offsetHeight - 80 || pText.scrollWidth > container.offsetWidth - 80) && fontSize > 20) {
                fontSize -= 1;
                pText.style.fontSize = fontSize + 'px';
            }
        }

        function updateBackground() {
            const lowerText = pText.innerText.toLowerCase();
            let theme = 'theme-default';
            if (themes.art.some(w => lowerText.includes(w))) theme = 'theme-art';
            else if (themes.success.some(w => lowerText.includes(w))) theme = 'theme-success';
            else if (themes.alert.some(w => lowerText.includes(w))) theme = 'theme-alert';
            sq.className = theme;
        }

        async function prepAndFullscreen() {
            try {
                const textToCopy = pText.innerText;
                const hiddenInput = document.createElement('textarea');
                hiddenInput.value = textToCopy;
                document.body.appendChild(hiddenInput);
                hiddenInput.select();
                document.execCommand('copy');
                document.body.removeChild(hiddenInput);
                toast.style.transform = 'translateY(0)';
                setTimeout(() => toast.style.transform = 'translateY(100px)', 2000);
            } catch (e) {}
            
            if (!document.fullscreenElement) {
                sq.requestFullscreen().catch(() => {});
            }
        }

        pText.addEventListener('input', () => {
            updateBackground();
            adjustFontSize();
        });

        // Ensure formatting is stripped on paste
        document.querySelectorAll('[contenteditable]').forEach(el => {
            el.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });
        });

        window.addEventListener('load', () => {
            adjustFontSize();
            updateBackground();
        });
    </script>
</body>
</html>
