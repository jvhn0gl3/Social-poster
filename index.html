<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio - Production Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --bg-dark: #05070a;
            --card-bg: rgba(15, 19, 31, 0.85);
        }

        body {
            background-color: #0b0e14;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #exportSquare:fullscreen {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        #exportSquare {
            width: 1000px; 
            height: 1000px;
            zoom: 0.5; 
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Themes */
        .theme-default { background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.3) 0px, transparent 50%); }
        .theme-art { background-image: radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.3) 0px, transparent 50%); }
        .theme-success { background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.3) 0px, transparent 50%); }
        .theme-alert { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(220, 38, 38, 0.3) 0px, transparent 50%); }
        .theme-minimal { background-image: radial-gradient(at 0% 0%, rgba(255, 255, 255, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(255, 255, 255, 0.05) 0px, transparent 50%); }

        .post-inner { z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 25px; }

        /* Editable State Styling */
        [contenteditable="true"] { outline: none; cursor: text; transition: all 0.2s; }
        .is-editing [contenteditable="true"]:hover { background: rgba(255,255,255,0.08); border-radius: 4px; box-shadow: 0 0 0 4px rgba(255,255,255,0.08); }
        .is-locked [contenteditable="true"] { cursor: default !important; }

        .tag {
            height: 32px; padding: 0 12px; font-size: 11px; font-weight: 900;
            display: flex; align-items: center; text-transform: uppercase;
            border-radius: 6px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); }

        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 550px; }
        .social-cell {
            background: rgba(255, 255, 255, 0.03); border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px;
            display: flex; justify-content: space-around; font-size: 20px;
        }

        #captureArea {
            width: 550px; height: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            border-radius: 60px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .content-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 50px; }
        #previewText { font-weight: 900; color: #ffffff; letter-spacing: -0.05em; line-height: 1; width: 100%; }

        .internal-footer {
            width: 100%; padding: 25px 0; border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center; font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* UI Controls */
        .controls-container {
            width: 420px; background: rgba(17, 24, 39, 0.95); margin-top: 20px;
            border-radius: 20px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-group { display: grid; grid-template-columns: 100px 1fr; gap: 10px; }
        .btn { padding: 14px; border-radius: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .btn-lock { background: #374151; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-lock.active { background: #991b1b; color: white; border-color: #ef4444; }
        .btn-blue { background: var(--accent); color: white; }
        
        #copyToast {
            position: fixed; bottom: 20px; background: #10b981; color: white;
            padding: 10px 25px; border-radius: 30px; font-weight: 700;
            transform: translateY(100px); transition: transform 0.3s;
            z-index: 100; font-size: 12px;
        }
    </style>
</head>
<body class="is-editing">

    <div id="copyToast">TEXT COPIED!</div>

    <div id="exportSquare" class="theme-default">
        <div class="post-inner">
            <div class="meta-row">
                <div class="tag tag-gray" contenteditable="true">DAY 068</div>
                <div class="tag tag-gray" contenteditable="true">18%</div>
                <div class="tag tag-blue" contenteditable="true">03.09.2026</div>
                <div class="tag tag-blue" contenteditable="true" style="opacity: 0.8;">@jvhn0gl3</div>
            </div>

            <div class="social-row">
                <div class="social-cell"><i class="fa-brands fa-facebook text-blue-500"></i><i class="fa-brands fa-threads text-white"></i></div>
                <div class="social-cell"><i class="fa-brands fa-youtube text-red-600"></i><i class="fa-brands fa-instagram text-pink-500"></i></div>
            </div>

            <div id="captureArea">
                <div class="content-area">
                    <div id="previewText" contenteditable="true">READY FOR PRODUCTION</div>
                </div>
                <div class="internal-footer" contenteditable="true">@JVHN0GL3 // JOHN-OGLETREE</div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <div class="btn-group">
            <button id="lockBtn" onclick="toggleLock()" class="btn btn-lock">
                <i id="lockIcon" class="fa-solid fa-unlock"></i>
            </button>
            <button onclick="prepAndFullscreen()" class="btn btn-blue">
                <i class="fa-solid fa-camera"></i> Prepare Shot
            </button>
        </div>
    </div>

    <script>
        const pText = document.getElementById('previewText');
        const sq = document.getElementById('exportSquare');
        const toast = document.getElementById('copyToast');
        const lockBtn = document.getElementById('lockBtn');
        const lockIcon = document.getElementById('lockIcon');
        let isLocked = false;

        const themes = {
            art: ['design', 'art', 'style', 'love', 'creative', 'heart'],
            success: ['success', 'win', 'green', 'done', 'go', 'finished'],
            alert: ['alert', 'warning', 'fire', 'stop', 'hot', 'error'],
            minimal: ['minimal', 'black', 'white', 'simple', 'clean']
        };

        function toggleLock() {
            isLocked = !isLocked;
            document.body.className = isLocked ? 'is-locked' : 'is-editing';
            lockBtn.classList.toggle('active', isLocked);
            lockIcon.className = isLocked ? 'fa-solid fa-lock' : 'fa-solid fa-unlock';
            
            document.querySelectorAll('[contenteditable]').forEach(el => {
                el.contentEditable = !isLocked;
            });
        }

        function adjustFontSize() {
            let fontSize = 160; 
            pText.style.fontSize = fontSize + 'px';
            while ((pText.scrollHeight > 400 || pText.scrollWidth > 450) && fontSize > 20) {
                fontSize -= 2;
                pText.style.fontSize = fontSize + 'px';
            }
        }

        function updateBackground() {
            const lowerText = pText.innerText.toLowerCase();
            let theme = 'theme-default';
            if (themes.art.some(w => lowerText.includes(w))) theme = 'theme-art';
            else if (themes.success.some(w => lowerText.includes(w))) theme = 'theme-success';
            else if (themes.alert.some(w => lowerText.includes(w))) theme = 'theme-alert';
            else if (themes.minimal.some(w => lowerText.includes(w))) theme = 'theme-minimal';
            sq.className = theme;
        }

        async function prepAndFullscreen() {
            await navigator.clipboard.writeText(pText.innerText);
            toast.style.transform = 'translateY(0)';
            setTimeout(() => toast.style.transform = 'translateY(100px)', 2000);
            if (!document.fullscreenElement) sq.requestFullscreen();
        }

        pText.addEventListener('input', () => {
            updateBackground();
            adjustFontSize();
        });

        document.querySelectorAll('[contenteditable]').forEach(el => {
            el.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });
        });

        window.addEventListener('load', adjustFontSize);
    </script>
</body>
</html>
