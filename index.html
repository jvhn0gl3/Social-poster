<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .app-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
            max-width: 900px;
            margin-top: 10px;
        }

        /* 9:16 Fixed Frame with 1:1 Safe Zone Logic */
        .card-container {
            width: 320px; 
            height: 568px; /* Strict 9:16 */
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8);
            border: 4px solid #1e293b;
            background: #000;
            flex-shrink: 0;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center; /* Center the content vertically for easy 1:1 cropping */
            padding: 20px;
            position: relative;
        }

        /* The "Safe Zone" - This is what will become the 1:1 post */
        .safe-zone-1to1 {
            width: 280px; 
            height: 280px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.1); 
            box-sizing: border-box;
        }

        .header-meta-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            width: 100%;
            flex-shrink: 0;
        }

        .meta-pills {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .caption-text-area {
            flex: 1;
            font-size: 9px;
            font-weight: 300;
            line-height: 1.2;
            color: rgba(255, 255, 255, 0.9);
            max-height: 30px;
            overflow: hidden;
        }

        .main-image-container {
            width: 100%;
            flex: 1; 
            border-radius: 10px;
            overflow: hidden;
            background: #000; /* Black background for letterboxing */
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: block;
            position: relative;
        }

        .main-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Shows the WHOLE image without cropping */
            position: absolute;
            top: 0;
            left: 0;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            width: 100%;
            flex-shrink: 0;
        }

        .icon-bar-inline {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
        }

        .brand-pill, .date-pill {
            background: #3b82f6;
            color: white;
            border-radius: 100px;
            padding: 2px 8px;
            font-size: 7px;
            font-weight: 800;
            letter-spacing: 0.05em;
            width: fit-content;
        }

        .controls-panel {
            width: 340px;
            background: #0f172a;
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .input-group { margin-bottom: 12px; }
        .input-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 10px;
            color: white;
            font-size: 12px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            display: block;
            width: 100%;
            font-size: 13px;
        }

        .btn-download {
            background: #10b981;
        }

        .loading-spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        [contenteditable="true"]:focus { outline: none; background: rgba(59, 130, 246, 0.2); border-radius: 4px; }

        @media (max-width: 700px) {
            .app-wrapper { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="mb-4 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter">pxltr Studio</h1>
        <p class="text-slate-400 text-[9px] uppercase tracking-widest">Safe-Zone Composer</p>
    </div>

    <div class="app-wrapper">
        <div class="card-container" id="captureCard">
            <div class="canvas-area" id="canvasArea">
                <div class="safe-zone-1to1" id="safeZone">
                    <div class="header-meta-row">
                        <div class="meta-pills">
                            <div class="date-pill" id="displayDate" contenteditable="true">01.31.2026</div>
                            <div class="brand-pill uppercase" id="displayHandle" contenteditable="true">@PXTR30</div>
                        </div>
                        <div class="caption-text-area" id="displayCaption" contenteditable="true">
                            Visions of a digital dreamscape where light and form collide.
                        </div>
                    </div>
                    
                    <div class="main-image-container">
                        <img 
                            src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600" 
                            id="mainImage" 
                            class="main-image"
                            crossorigin="anonymous"
                        >
                    </div>

                    <div class="footer-row">
                        <div class="icon-bar-inline">
                            <i class="fa-brands fa-youtube text-[8px]" style="color:#ff0000"></i>
                            <i class="fa-brands fa-instagram text-[8px]" style="color:#ff4d4d"></i>
                            <i class="fa-brands fa-threads text-[8px]" style="color:#fff"></i>
                        </div>
                        <div class="h-0.5 w-8 bg-white/20 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="section-title">Visuals</div>
            <div class="flex gap-2 mb-3">
                <button class="btn bg-slate-800 border border-slate-700 flex-1 flex items-center justify-center gap-2" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-upload text-[10px]"></i> Change
                </button>
                <button class="btn btn-download flex-1 flex items-center justify-center gap-2" onclick="downloadImage()">
                    <i class="fa-solid fa-download text-[10px]"></i> Pull PNG
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
            </div>

            <div class="section-title mt-4">Content</div>
            <div class="grid grid-cols-2 gap-2 mb-2">
                <div class="input-group">
                    <label class="input-label">Date</label>
                    <input type="text" id="dateInput" oninput="updateFromInput('dateInput', 'displayDate', 'innerText')">
                </div>
                <div class="input-group">
                    <label class="input-label">Handle</label>
                    <input type="text" id="handleInput" oninput="updateFromInput('handleInput', 'displayHandle', 'innerText')">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Caption</label>
                <textarea id="captionInput" rows="2" oninput="updateFromInput('captionInput', 'displayCaption', 'innerText')"></textarea>
            </div>

            <div class="section-title mt-4">AI Creator</div>
            <div class="input-group">
                <div class="flex gap-1">
                    <input type="text" id="aiPrompt" placeholder="Generate art...">
                    <button class="btn w-16" id="genImageBtn" onclick="generateAIImage()">
                        <div class="loading-spinner" id="genSpinner"></div>
                        <span id="genText">Go</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";

        function updateFromInput(inputId, targetId, property) {
            document.getElementById(targetId).innerText = document.getElementById(inputId).value;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('mainImage').src = e.target.result; };
                reader.readAsDataURL(file);
            }
        }

        async function downloadImage() {
            const card = document.getElementById('captureCard');
            const safeZone = document.getElementById('safeZone');
            const originalBorder = safeZone.style.border;
            safeZone.style.border = 'none';

            try {
                const canvas = await html2canvas(card, { scale: 3, useCORS: true, backgroundColor: null, borderRadius: 24 });
                const link = document.createElement('a');
                link.download = `pxltr-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) { console.error(err); } 
            finally { safeZone.style.border = originalBorder; }
        }

        document.querySelectorAll('[contenteditable="true"]').forEach(el => {
            el.addEventListener('input', () => {
                const inputMap = { 'displayDate': 'dateInput', 'displayHandle': 'handleInput', 'displayCaption': 'captionInput' };
                if (inputMap[el.id]) document.getElementById(inputMap[el.id]).value = el.innerText;
            });
        });

        async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                } catch (e) { if (i === retries - 1) throw e; }
                await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
            }
        }

        async function generateAIImage() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) return;
            const btn = document.getElementById('genImageBtn'), spinner = document.getElementById('genSpinner'), text = document.getElementById('genText');
            btn.disabled = true; spinner.style.display = 'block'; text.style.display = 'none';

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    body: JSON.stringify({ instances: [{ prompt: prompt }], parameters: { sampleCount: 1 } })
                });
                if (data.predictions?.[0]?.bytesBase64Encoded) {
                    document.getElementById('mainImage').src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                }
            } catch (err) { console.error(err); } 
            finally { btn.disabled = false; spinner.style.display = 'none'; text.style.display = 'inline'; }
        }

        window.onload = () => {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}.${now.getFullYear()}`;
            document.getElementById('displayDate').innerText = dateStr;
            document.getElementById('dateInput').value = dateStr;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText;
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText;
        };
    </script>
</body>
</html>
