<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-wrapper {
            padding: 20px;
            background: transparent;
        }

        /* Fixed 9:16 Base */
        .card-container {
            width: 337.5px; 
            height: 600px; 
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 8px solid #1e293b;
            background: #000;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: #0f172a;
            position: relative;
            transition: all 0.5s ease;
        }

        .canvas-area.glow-mode {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }

        /* 4:5 Safe Area - Using Absolute Centering for Snapshot Stability */
        .safe-area-content {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 337.5px;
            height: 421.8px; /* Precise 4:5 ratio height for 337.5 width */
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
        }

        .guides-active .safe-area-content {
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px dashed rgba(255,255,255,0.3);
            border-bottom: 1px dashed rgba(255,255,255,0.3);
        }

        .top-section {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            width: 100%;
        }

        .meta-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .caption-area {
            flex-grow: 1;
            font-size: 10px;
            font-weight: 400;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.8);
            text-align: left;
            outline: none;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        /* Capture Overrides */
        .is-capturing .caption-area {
            display: block !important;
            overflow: visible !important;
            -webkit-line-clamp: none !important;
        }

        .media-container {
            width: 100%;
            flex-grow: 1;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .media-asset {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .show-full-media {
            object-fit: contain !important;
        }

        .brand-pill, .date-pill {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            padding: 4px 10px;
            font-size: 7px;
            font-weight: 800;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            outline: none;
            display: inline-block;
        }

        .icon-bar-inline {
            display: flex;
            gap: 8px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            width: fit-content;
        }

        .controls-panel {
            margin-top: 20px;
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #1e293b;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        #dropOverlay {
            position: absolute;
            inset: 0;
            background: rgba(59, 130, 246, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase">pxltr v2</h1>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest">Story Canvas / Feed Safe</p>
    </div>

    <div class="card-wrapper">
        <div class="card-container" id="captureCard">
            <div id="dropOverlay" class="text-white font-black text-xl italic uppercase">Drop Media</div>
            <div class="canvas-area glow-mode" id="cardCanvas">
                
                <!-- Safe Area centered via absolute top:50% -->
                <div class="safe-area-content" id="safeArea">
                    <div class="top-section">
                        <div class="meta-column">
                            <div class="date-pill" id="displayDate" contenteditable="true">01.21.2026</div>
                            <div class="brand-pill uppercase" id="displayHandle" contenteditable="true">@PXTR30</div>
                            <div class="icon-bar-inline">
                                <i class="fa-brands fa-youtube text-[8px]" style="color:#ff0000"></i>
                                <i class="fa-brands fa-instagram text-[8px]" style="color:#ff4d4d"></i>
                                <i class="fa-brands fa-threads text-[8px]" style="color:#fff"></i>
                            </div>
                        </div>
                        <div class="caption-area" id="displayCaption" contenteditable="true">
                            Perfectly centered for both Instagram Story and Feed layouts.
                        </div>
                    </div>
                    
                    <div class="media-container">
                        <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=600" id="mainImage" class="media-asset show-full-media" crossorigin="anonymous">
                        <video id="mainVideo" class="media-asset hidden show-full-media" muted playsinline></video>
                    </div>
                </div>

                <div class="absolute bottom-10 flex justify-center w-full">
                    <div class="h-1.5 w-12 bg-white/30 rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="section-title">Visuals</div>
        <div class="flex flex-wrap gap-4 mb-4">
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="fitMode" onchange="toggleFitMode()" checked> 
                <span>Fit Image</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="glowToggle" onchange="toggleGlow()" checked> 
                <span>Glow</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="guideToggle" onchange="toggleGuides()"> 
                <span>Show 4:5 Safe Zone</span>
            </label>
        </div>

        <button class="btn bg-slate-800 mb-4" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-upload"></i> Upload Media
        </button>
        <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(event)">

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Date</label>
                <input type="text" id="dateInput" placeholder="Date" oninput="update('dateInput', 'displayDate')">
            </div>
            <div>
                <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Handle</label>
                <input type="text" id="handleInput" placeholder="Handle" oninput="update('handleInput', 'displayHandle')">
            </div>
        </div>

        <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Caption</label>
        <textarea id="captionInput" rows="2" class="mb-6" oninput="update('captionInput', 'displayCaption')"></textarea>

        <button class="btn bg-emerald-600 hover:bg-emerald-500" onclick="downloadScreenshot()">
            <i class="fa-solid fa-download"></i> Export High-Res PNG
        </button>
    </div>

    <script>
        function toggleGuides() {
            document.getElementById('cardCanvas').classList.toggle('guides-active', document.getElementById('guideToggle').checked);
        }

        function toggleFitMode() {
            const isFit = document.getElementById('fitMode').checked;
            document.getElementById('mainImage').classList.toggle('show-full-media', isFit);
            document.getElementById('mainVideo').classList.toggle('show-full-media', isFit);
        }

        function toggleGlow() {
            document.getElementById('cardCanvas').classList.toggle('glow-mode', document.getElementById('glowToggle').checked);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const img = document.getElementById('mainImage');
            const video = document.getElementById('mainVideo');
            const reader = new FileReader();

            if (file.type.startsWith('image/')) {
                video.classList.add('hidden');
                video.pause();
                img.classList.remove('hidden');
                reader.onload = (e) => img.src = e.target.result;
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                img.classList.add('hidden');
                video.classList.remove('hidden');
                video.src = URL.createObjectURL(file);
                video.play();
            }
        }

        function update(id, target) {
            document.getElementById(target).innerText = document.getElementById(id).value;
        }

        async function downloadScreenshot() {
            const element = document.getElementById('captureCard');
            document.body.classList.add('is-capturing');
            
            // Temporary Guide removal
            const guidesCheckbox = document.getElementById('guideToggle');
            const wasGuides = guidesCheckbox.checked;
            if (wasGuides) {
                guidesCheckbox.checked = false;
                toggleGuides();
            }

            try {
                const canvas = await html2canvas(element, { 
                    useCORS: true, 
                    scale: 3, 
                    backgroundColor: "#000000",
                    width: 337.5,
                    height: 600,
                    onclone: (clonedDoc) => {
                        // Ensure the cloned container is explicitly positioned at top-left
                        const el = clonedDoc.getElementById('captureCard');
                        el.style.margin = "0";
                        el.style.position = "relative";
                        el.style.left = "0";
                        el.style.top = "0";
                    }
                });

                const link = document.createElement('a');
                link.download = `pxltr-story-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } finally {
                document.body.classList.remove('is-capturing');
                if (wasGuides) {
                    guidesCheckbox.checked = true;
                    toggleGuides();
                }
            }
        }

        window.onload = () => {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}.${now.getFullYear()}`;
            document.getElementById('displayDate').innerText = dateStr;
            document.getElementById('dateInput').value = dateStr;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText;
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText;
        };
    </script>
</body>
</html>
