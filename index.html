<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            background-color: #05070a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* The Live Preview - Optimized for viewing */
        #captureArea {
            width: 400px;
            height: 400px;
            background-color: #0f131f;
            background-image: radial-gradient(circle at 50% 0%, #1a2236 0%, #0f131f 80%);
            border-radius: 50px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header-tags {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }

        .tag {
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tag-blue {
            background: #2563eb;
            color: #ffffff;
        }

        .tag-gray {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px 0;
        }

        #previewText {
            font-size: 26px;
            line-height: 1.35;
            font-weight: 700;
            color: #ffffff;
            word-wrap: break-word;
            max-width: 100%;
            letter-spacing: -0.02em;
        }

        .social-container {
            display: flex;
            justify-content: center;
        }

        .social-bar {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 22px;
            border-radius: 100px;
            display: flex;
            gap: 14px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .social-bar i {
            font-size: 14px;
        }

        /* Controls Panel */
        .controls-container {
            width: 100%;
            max-width: 400px;
            background: #0f131f;
            margin-top: 30px;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 60px;
        }

        .input-label {
            color: #3b82f6;
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            background: #161b2a;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
            background: #1a2236;
        }

        .btn-export {
            background: #2563eb;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-export:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.3);
        }

        /* Hidden Master Stage for Clean Rendering */
        #renderStage {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }
    </style>
</head>
<body>

    <div class="text-center mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter">PXTR STUDIO</h1>
        <p class="text-[9px] tracking-[3px] text-gray-500 font-bold uppercase">Pixel-Perfect Render Engine</p>
    </div>

    <!-- Live Preview -->
    <div id="captureArea">
        <div class="header-tags">
            <div class="tag tag-gray" id="progressTag">0%</div>
            <div class="tag tag-blue" id="dateTag">02.24.2026</div>
            <div class="tag tag-blue" id="handleTag">@PXTR30</div>
        </div>

        <div class="content-area">
            <div id="previewText">Focus</div>
        </div>

        <div class="social-container">
            <div class="social-bar">
                <i class="fa-brands fa-facebook text-blue-500"></i>
                <i class="fa-brands fa-threads text-white"></i>
                <i class="fa-brands fa-tumblr text-blue-400"></i>
                <i class="fa-brands fa-reddit-alien text-orange-500"></i>
                <i class="fa-brands fa-discord text-indigo-400"></i>
                <i class="fa-brands fa-snapchat text-yellow-400"></i>
                <i class="fa-brands fa-tiktok text-cyan-400"></i>
                <i class="fa-brands fa-youtube text-red-600"></i>
                <i class="fa-brands fa-instagram text-pink-500"></i>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-container">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <span class="input-label">Date</span>
                <input type="text" id="inputDate" class="input-field" value="02.24.2026">
            </div>
            <div>
                <span class="input-label">Handle</span>
                <input type="text" id="inputHandle" class="input-field" value="@PXTR30">
            </div>
        </div>
        
        <div class="mb-4">
            <span class="input-label">Message Content</span>
            <textarea id="inputText" class="input-field h-24 resize-none">Focus on the output. Precision over everything.</textarea>
        </div>

        <button onclick="captureCard()" class="btn-export">
            <i class="fas fa-bolt"></i> RENDER MASTER PNG
        </button>
    </div>

    <!-- The hidden high-res render container -->
    <div id="renderStage"></div>

    <script>
        const elements = {
            dateTag: document.getElementById('dateTag'),
            handleTag: document.getElementById('handleTag'),
            progressTag: document.getElementById('progressTag'),
            previewText: document.getElementById('previewText'),
            inputDate: document.getElementById('inputDate'),
            inputHandle: document.getElementById('inputHandle'),
            inputText: document.getElementById('inputText'),
            captureArea: document.getElementById('captureArea'),
            renderStage: document.getElementById('renderStage')
        };

        function calculateProgress() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const end = new Date(now.getFullYear() + 1, 0, 1);
            const progress = ((now - start) / (end - start)) * 100;
            elements.progressTag.innerText = Math.floor(progress) + '%';
        }

        calculateProgress();

        // Real-time bindings
        elements.inputDate.addEventListener('input', (e) => elements.dateTag.innerText = e.target.value);
        elements.inputHandle.addEventListener('input', (e) => elements.handleTag.innerText = e.target.value);
        elements.inputText.addEventListener('input', (e) => elements.previewText.innerText = e.target.value);

        async function captureCard() {
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> CALCULATING PIXELS...';
            btn.disabled = true;

            try {
                // To solve the "halo" and "blur" issue, we clone the area into a larger scale
                // and strip away properties that cause library glitches (like box-shadows)
                const canvas = await html2canvas(elements.captureArea, {
                    scale: 4, // Ultra high res
                    backgroundColor: "#05070a",
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    onclone: (clonedDoc) => {
                        const area = clonedDoc.getElementById('captureArea');
                        area.style.boxShadow = 'none'; // Shadows are the main cause of halos
                        area.style.border = 'none';
                        // Adjust font rendering for the clone
                        const text = clonedDoc.getElementById('previewText');
                        text.style.webkitFontSmoothing = "antialiased";
                    }
                });

                const link = document.createElement('a');
                link.download = `pxtr-master-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (err) {
                console.error("Capture Error:", err);
            } finally {
                btn.innerHTML = '<i class="fas fa-bolt"></i> RENDER MASTER PNG';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
