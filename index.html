<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #capture-wrapper {
            padding: 0;
            margin: 0;
            display: inline-block;
        }

        .card-container {
            width: 337.5px; 
            height: 600px; 
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 8px solid #1e293b;
            background: #000;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .canvas-area.glow-mode {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }

        .safe-area-content {
            width: 337.5px;
            height: 421.8px; 
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
        }

        .guides-active .safe-area-content {
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px dashed rgba(255,255,255,0.3);
            border-bottom: 1px dashed rgba(255,255,255,0.3);
        }

        .caption-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
            width: 100%;
        }

        .accent-sidebar {
            width: 48px;
            background: #3b82f6;
            border-radius: 12px;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 4px;
        }

        .social-icons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            color: white;
            width: 100%;
        }

        .social-icons-grid i {
            font-size: 9px;
            text-align: center;
        }

        .horizontal-handle {
            font-size: 6.5px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: white;
            white-space: nowrap;
            display: block;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 6px;
            width: 80%;
            text-align: center;
        }

        .caption-area {
            flex-grow: 1;
            font-size: 11px;
            font-weight: 400;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            text-align: left;
            outline: none;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
        }

        .date-display {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 60px;
            margin-bottom: 12px;
        }

        .media-container {
            width: 100%;
            flex-grow: 1;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-asset {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .show-full-media {
            object-fit: contain !important;
        }

        .controls-panel {
            margin-top: 20px;
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-record.recording {
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1); }
        }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        canvas#recorder-canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase">pxltr studio</h1>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest">Motion Layout • Video Support</p>
    </div>

    <div id="capture-wrapper">
        <div class="card-container" id="captureCard">
            <div class="canvas-area glow-mode guides-active" id="cardCanvas">
                <div class="safe-area-content" id="safeArea">
                    <div class="caption-row">
                        <div class="accent-sidebar">
                            <div class="social-icons-grid">
                                <i class="fa-brands fa-facebook-f"></i>
                                <i class="fa-brands fa-threads"></i>
                                <i class="fa-brands fa-youtube"></i>
                                <i class="fa-brands fa-instagram"></i>
                                <i class="fa-brands fa-tiktok"></i>
                                <i class="fa-solid fa-bolt text-[7px] opacity-40"></i>
                            </div>
                            <div class="horizontal-handle" id="displayHandle">pxltr30</div>
                        </div>

                        <div class="caption-area" id="displayCaption" contenteditable="true">
                            Now supporting video motion! Upload a clip, and use the record button to capture the entire card as a video file.
                        </div>
                    </div>
                    
                    <div class="date-display" id="displayDate">January 23, 2026</div>
                    
                    <div class="media-container">
                        <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=600" id="mainImage" class="media-asset show-full-media" crossorigin="anonymous">
                        <video id="mainVideo" class="media-asset hidden show-full-media" crossorigin="anonymous" playsinline></video>
                    </div>
                </div>

                <div class="absolute bottom-10 flex justify-center w-full">
                    <div class="h-1 w-10 bg-white/20 rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="section-title">Visuals</div>
        <div class="flex flex-wrap gap-4 mb-4">
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="fitMode" onchange="toggleFitMode()" checked> 
                <span>Fit Image</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="glowToggle" onchange="toggleGlow()" checked> 
                <span>Glow</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="guideToggle" onchange="toggleGuides()" checked> 
                <span>Show Safe Zone</span>
            </label>
        </div>

        <button class="btn bg-slate-800 mb-4" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-upload"></i> Upload Media (Img/Vid)
        </button>
        <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(event)">

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Handle</label>
                <input type="text" id="handleInput" oninput="update('handleInput', 'displayHandle')">
            </div>
            <div>
                <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Date</label>
                <input type="text" id="dateInput" oninput="update('dateInput', 'displayDate')">
            </div>
        </div>
        
        <div class="mb-4">
            <label class="text-[10px] uppercase text-slate-500 font-bold mb-1 block">Caption</label>
            <textarea id="captionInput" rows="3" oninput="update('captionInput', 'displayCaption')"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button class="btn bg-emerald-600 hover:bg-emerald-500" onclick="downloadScreenshot()">
                <i class="fa-solid fa-image"></i> PNG
            </button>
            <button id="recordBtn" class="btn btn-record bg-blue-600 hover:bg-blue-500 hidden" onclick="startRecording()">
                <i class="fa-solid fa-circle"></i> Record Video
            </button>
        </div>
    </div>

    <script>
        let recorder = null;
        let chunks = [];

        function toggleGuides() {
            document.getElementById('cardCanvas').classList.toggle('guides-active', document.getElementById('guideToggle').checked);
        }

        function toggleFitMode() {
            const isFit = document.getElementById('fitMode').checked;
            document.getElementById('mainImage').classList.toggle('show-full-media', isFit);
            document.getElementById('mainVideo').classList.toggle('show-full-media', isFit);
        }

        function toggleGlow() {
            document.getElementById('cardCanvas').classList.toggle('glow-mode', document.getElementById('glowToggle').checked);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const img = document.getElementById('mainImage');
            const video = document.getElementById('mainVideo');
            const recordBtn = document.getElementById('recordBtn');
            const reader = new FileReader();

            if (file.type.startsWith('image/')) {
                video.classList.add('hidden');
                video.pause();
                img.classList.remove('hidden');
                recordBtn.classList.add('hidden');
                reader.onload = (e) => img.src = e.target.result;
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                img.classList.add('hidden');
                video.classList.remove('hidden');
                recordBtn.classList.remove('hidden');
                video.src = URL.createObjectURL(file);
                video.load();
                video.muted = false; 
                video.volume = 1;
            }
        }

        function update(id, target) {
            document.getElementById(target).innerText = document.getElementById(id).value;
        }

        async function downloadScreenshot() {
            const element = document.getElementById('captureCard');
            const canvas = await html2canvas(element, { 
                useCORS: true, 
                scale: 3, 
                width: 337.5, 
                height: 600,
                onclone: (clonedDoc) => {
                    const el = clonedDoc.getElementById('captureCard');
                    el.style.margin = "0"; 
                    el.style.border = "none"; 
                    el.style.borderRadius = "0";
                }
            });
            const link = document.createElement('a');
            link.download = `pxltr-story-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        async function startRecording() {
            const video = document.getElementById('mainVideo');
            const card = document.getElementById('captureCard');
            const recordBtn = document.getElementById('recordBtn');
            
            // Set dimensions explicitly for 2x scaling to match aspect ratio perfectly
            const REC_WIDTH = 337.5;
            const REC_HEIGHT = 600;
            const SCALE = 2;
            
            const captureCanvas = document.createElement('canvas');
            captureCanvas.id = "recorder-canvas";
            captureCanvas.width = REC_WIDTH * SCALE;
            captureCanvas.height = REC_HEIGHT * SCALE;
            const ctx = captureCanvas.getContext('2d');
            
            video.currentTime = 0;
            recordBtn.disabled = true;
            recordBtn.classList.add('recording');
            recordBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Recording...';

            const stream = captureCanvas.captureStream(30);
            
            // Handle audio capture
            if (video.captureStream || video.mozCaptureStream) {
                const videoStream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
                videoStream.getAudioTracks().forEach(track => stream.addTrack(track));
            }

            recorder = new MediaRecorder(stream, { 
                mimeType: 'video/webm;codecs=vp9,opus',
                videoBitsPerSecond: 5000000 // 5Mbps for quality
            });
            
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pxltr-video-${Date.now()}.webm`;
                a.click();
                
                recordBtn.disabled = false;
                recordBtn.classList.remove('recording');
                recordBtn.innerHTML = '<i class="fa-solid fa-circle"></i> Record Video';
            };

            recorder.start();
            video.play();

            async function renderFrame() {
                if (video.paused || video.ended || recorder.state === "inactive") {
                    if (recorder.state === "recording") recorder.stop();
                    return;
                }

                try {
                    const canvas = await html2canvas(card, {
                        scale: SCALE,
                        width: REC_WIDTH,
                        height: REC_HEIGHT,
                        logging: false,
                        useCORS: true,
                        backgroundColor: '#000000'
                    });
                    
                    ctx.clearRect(0, 0, captureCanvas.width, captureCanvas.height);
                    // Draw captured frame at full canvas size to avoid stretching
                    ctx.drawImage(canvas, 0, 0, captureCanvas.width, captureCanvas.height);
                } catch (e) {
                    console.error("Frame capture failed", e);
                }
                
                requestAnimationFrame(renderFrame);
            }

            // Small delay to ensure video buffer is active
            setTimeout(renderFrame, 100);
            
            video.onended = () => {
                if(recorder.state === "recording") recorder.stop();
            };
        }

        function setCurrentDate() {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            document.getElementById('displayDate').innerText = today;
            document.getElementById('dateInput').value = today;
        }

        window.onload = () => {
            document.getElementById('guideToggle').checked = true;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText.trim();
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText.trim();
            setCurrentDate();
        };
    </script>
</body>
</html>
