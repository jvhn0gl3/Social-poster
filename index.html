<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio // Instagram Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --accent-dark: #1e40af;
            --bg-dark: #05070a;
        }

        body {
            background-color: #111;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* INSTAGRAM POST BOX (The "Canvas") */
        #exportSquare {
            width: 500px;
            height: 500px;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.15) 0px, transparent 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #exportSquare::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }

        /* SCREENSHOT MODE OVERRIDES */
        :fullscreen body {
            background-color: #000 !important;
            cursor: none !important;
        }

        :fullscreen .controls-container {
            display: none !important;
        }

        /* Resizes the square to fill the screen for a perfect 1:1 snap */
        :fullscreen #exportSquare {
            width: 100vh !important; /* Forces 1:1 ratio based on screen height */
            height: 100vh !important;
            box-shadow: none;
            transform: scale(1);
        }

        .post-inner {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .meta-row { display: flex; gap: 4px; }

        .tag {
            height: 22px; 
            padding: 0 8px;
            font-size: 7px; 
            font-weight: 900;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            border-radius: 4px;
            backdrop-filter: blur(10px);
        }

        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); }

        .social-header-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 65%;
        }

        .social-cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        #captureArea {
            width: 65%; 
            aspect-ratio: 1/1;
            background-color: #0f131f;
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%),
                radial-gradient(circle at 50% 0%, #1e2638 0%, #0f131f 95%);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            overflow: hidden;
        }

        #previewText {
            line-height: 1.1;
            font-weight: 900;
            color: #ffffff;
            word-wrap: break-word;
            max-width: 100%;
            letter-spacing: -0.04em;
        }

        .footer-premium {
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            border-top: 1px solid rgba(255,255,255,0.05);
            width: 65%;
            padding: 8px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            border-radius: 10px;
        }

        .footer-part {
            font-size: 7px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .controls-container {
            width: 100%;
            max-width: 500px;
            background: rgba(17, 24, 39, 0.8);
            margin-top: 30px;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .input-field {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px 12px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 13px;
        }

        .btn-screenshot {
            background: var(--accent);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            width: 100%;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="exportSquare">
        <div class="post-inner">
            <div class="meta-row">
                <div class="tag tag-gray" id="dayOfYearTag">DAY 000</div>
                <div class="tag tag-gray" id="progressTag">0%</div>
                <div class="tag tag-blue" id="dateTag">03.02.2026</div>
                <div class="tag tag-blue" style="background: var(--accent-dark);" id="handleTag">@jvhn0gl3</div>
            </div>

            <div class="social-header-row">
                <div class="social-cell"><i class="fa-brands fa-facebook text-blue-500"></i><i class="fa-brands fa-threads text-white"></i></div>
                <div class="social-cell"><i class="fa-brands fa-youtube text-red-600"></i><i class="fa-brands fa-instagram text-pink-500"></i></div>
            </div>

            <div id="captureArea">
                <div class="content-area" id="contentArea">
                    <div id="previewText">INSTA READY</div>
                </div>
            </div>

            <div class="footer-premium">
                <span class="footer-part" id="footerHandle">@JVHN0GL3 // JOHN-OGLETREE</span>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <input type="text" id="inputDate" class="input-field" value="03.02.2026">
            <input type="text" id="inputHandle" class="input-field" value="@jvhn0gl3">
        </div>
        <textarea id="inputText" class="input-field h-16 resize-none">INSTA READY</textarea>
        <button onclick="enterScreenshotMode()" class="btn-screenshot">
            <i class="fa-solid fa-camera"></i> IG Screenshot Mode
        </button>
    </div>

    <script>
        const elements = {
            dateTag: document.getElementById('dateTag'),
            handleTag: document.getElementById('handleTag'),
            progressTag: document.getElementById('progressTag'),
            dayOfYearTag: document.getElementById('dayOfYearTag'),
            previewText: document.getElementById('previewText'),
            contentArea: document.getElementById('contentArea'),
            inputDate: document.getElementById('inputDate'),
            inputHandle: document.getElementById('inputHandle'),
            inputText: document.getElementById('inputText'),
            footerHandle: document.getElementById('footerHandle'),
            exportSquare: document.getElementById('exportSquare')
        };

        function enterScreenshotMode() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }

        // Auto-scale font on text change
        function adjustFontSize() {
            const container = elements.contentArea;
            const text = elements.previewText;
            let fontSize = 140; 
            text.style.fontSize = fontSize + 'px';
            while ((text.scrollHeight > container.offsetHeight || text.scrollWidth > container.offsetWidth) && fontSize > 10) {
                fontSize--;
                text.style.fontSize = fontSize + 'px';
            }
        }

        function updateMetrics() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const dayOfYear = Math.floor((now - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
            elements.dayOfYearTag.innerText = `DAY ${dayOfYear.toString().padStart(3, '0')}`;
            const endOfYear = new Date(now.getFullYear() + 1, 0, 1);
            const progress = ((now - startOfYear) / (endOfYear - startOfYear)) * 100;
            elements.progressTag.innerText = Math.floor(progress) + '%';
        }

        elements.inputDate.addEventListener('input', (e) => elements.dateTag.innerText = e.target.value);
        elements.inputHandle.addEventListener('input', (e) => {
            elements.handleTag.innerText = e.target.value;
            elements.footerHandle.innerText = `${e.target.value.toUpperCase()} // JOHN-OGLETREE`;
        });
        elements.inputText.addEventListener('input', (e) => {
            elements.previewText.innerText = e.target.value;
            adjustFontSize();
        });

        // Toggle exit
        elements.exportSquare.onclick = () => { if (document.fullscreenElement) document.exitFullscreen(); };

        updateMetrics();
        window.addEventListener('load', adjustFontSize);
    </script>
</body>
</html>
