<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            background-color: #05070a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* The Export Canvas - High Precision */
        #captureArea {
            width: 500px;
            height: 500px;
            background-color: #0f131f;
            background-image: radial-gradient(circle at 50% 0%, #1a2236 0%, #0f131f 70%);
            border-radius: 60px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            /* Prevent library artifacts */
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .tag {
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Solid colors to avoid html2canvas filter bugs */
        .tag-blue {
            background: #2563eb;
            color: #ffffff;
        }

        .tag-gray {
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.7);
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px 0;
        }

        #previewText {
            font-size: 32px;
            line-height: 1.3;
            font-weight: 700;
            color: #ffffff;
            word-wrap: break-word;
            max-width: 100%;
            letter-spacing: -0.01em;
            /* Force hardware acceleration for sharper text */
            transform: translateZ(0);
        }

        .social-container {
            display: flex;
            justify-content: center;
        }

        .social-bar {
            background: rgba(255, 255, 255, 0.06);
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .social-bar i {
            font-size: 16px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* Controls Panel */
        .controls-container {
            width: 100%;
            max-width: 500px;
            background: #111827;
            margin-top: 40px;
            border-radius: 28px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 80px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            color: #3b82f6;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .input-field {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 14px;
            padding: 16px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 15px;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
            background: #262f3f;
        }

        .btn-export {
            background: #2563eb;
            color: white;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .btn-export:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-export:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="text-center mb-10">
        <h1 class="text-3xl font-black italic tracking-tighter">PXTR STUDIO</h1>
        <div class="h-1 w-12 bg-blue-600 mx-auto mt-2 rounded-full"></div>
    </div>

    <!-- The Square Render Canvas -->
    <div id="captureArea">
        <div class="header-tags">
            <div class="tag tag-gray" id="progressTag">0%</div>
            <div class="tag tag-blue" id="dateTag">02.24.2026</div>
            <div class="tag tag-blue" id="handleTag">@PXTR30</div>
        </div>

        <div class="content-area">
            <div id="previewText">Focus on the output. Precision over everything.</div>
        </div>

        <div class="social-container">
            <div class="social-bar">
                <i class="fa-brands fa-facebook text-blue-500"></i>
                <i class="fa-brands fa-threads text-white"></i>
                <i class="fa-brands fa-tumblr text-blue-400"></i>
                <i class="fa-brands fa-reddit-alien text-orange-500"></i>
                <i class="fa-brands fa-discord text-indigo-400"></i>
                <i class="fa-brands fa-snapchat text-yellow-400"></i>
                <i class="fa-brands fa-tiktok text-cyan-400"></i>
                <i class="fa-brands fa-youtube text-red-600"></i>
                <i class="fa-brands fa-instagram text-pink-500"></i>
            </div>
        </div>
    </div>

    <!-- User Controls -->
    <div class="controls-container">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <span class="input-label">Date</span>
                <input type="text" id="inputDate" class="input-field" value="02.24.2026">
            </div>
            <div>
                <span class="input-label">Handle</span>
                <input type="text" id="inputHandle" class="input-field" value="@PXTR30">
            </div>
        </div>
        
        <div class="input-group">
            <span class="input-label">Message Content</span>
            <textarea id="inputText" class="input-field h-32 resize-none">Focus on the output. Precision over everything.</textarea>
        </div>

        <button onclick="captureCard()" class="btn-export">
            <i class="fas fa-file-export"></i> EXPORT HIGH-RES PNG
        </button>
    </div>

    <script>
        const elements = {
            dateTag: document.getElementById('dateTag'),
            handleTag: document.getElementById('handleTag'),
            progressTag: document.getElementById('progressTag'),
            previewText: document.getElementById('previewText'),
            inputDate: document.getElementById('inputDate'),
            inputHandle: document.getElementById('inputHandle'),
            inputText: document.getElementById('inputText'),
            captureArea: document.getElementById('captureArea')
        };

        function calculateProgress() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const end = new Date(now.getFullYear() + 1, 0, 1);
            const progress = ((now - start) / (end - start)) * 100;
            elements.progressTag.innerText = Math.floor(progress) + '%';
        }

        calculateProgress();

        // Real-time bindings
        elements.inputDate.addEventListener('input', (e) => elements.dateTag.innerText = e.target.value);
        elements.inputHandle.addEventListener('input', (e) => elements.handleTag.innerText = e.target.value);
        elements.inputText.addEventListener('input', (e) => elements.previewText.innerText = e.target.value);

        async function captureCard() {
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> RENDERING...';
            btn.disabled = true;

            try {
                // We use a high scale and force specific dimensions to solve blurring
                const canvas = await html2canvas(elements.captureArea, {
                    scale: 3, 
                    backgroundColor: null,
                    useCORS: true,
                    allowTaint: true,
                    // These ensure the crop is perfect
                    width: 500,
                    height: 500,
                    onclone: (clonedDoc) => {
                        // Ensure cloned elements are visible for rendering
                        const clonedArea = clonedDoc.getElementById('captureArea');
                        clonedArea.style.boxShadow = 'none'; // Avoid shadow artifacts in export
                    }
                });

                const link = document.createElement('a');
                link.download = `pxltr-output-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (err) {
                console.error("Capture Error:", err);
            } finally {
                btn.innerHTML = '<i class="fas fa-file-export"></i> EXPORT HIGH-RES PNG';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
