<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body {
            background-color: #05070a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Version 2.2 - Precision Layout */
        #captureArea {
            width: 450px;
            height: 450px;
            background-color: #0f131f;
            background-image: radial-gradient(circle at 50% 0%, #1a2236 0%, #0f131f 90%);
            border-radius: 70px; /* Slightly smoother corners */
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            overflow: hidden;
            /* Avoid border-induced halos in capture */
            border: none;
        }

        /* Fixed Top-Level Breathing Room */
        .header-tags {
            padding-top: 52px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .tag {
            padding: 9px 20px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            /* Force hardware acceleration for sharp edges */
            transform: translateZ(0);
        }

        .tag-blue {
            background: #2563eb;
            color: #ffffff;
        }

        .tag-gray {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        /* Content Area - Balanced Centering */
        .content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 55px;
        }

        #previewText {
            font-size: 34px; /* Slightly larger for impact */
            line-height: 1.25;
            font-weight: 800; /* Heavier weight for studio feel */
            color: #ffffff;
            word-wrap: break-word;
            max-width: 100%;
            letter-spacing: -0.04em;
            text-rendering: optimizeLegibility;
        }

        /* Fixed Bottom-Level Breathing Room */
        .social-container {
            padding-bottom: 52px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .social-bar {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 30px;
            border-radius: 100px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .social-bar i {
            font-size: 15px;
            /* Ensure colors are vibrant in render */
            opacity: 1 !important;
        }

        /* Control Interface */
        .controls-container {
            width: 100%;
            max-width: 450px;
            background: #111827;
            margin-top: 40px;
            border-radius: 32px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 80px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .input-label {
            color: #3b82f6;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .input-field {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .btn-export {
            background: #2563eb;
            color: white;
            padding: 18px;
            border-radius: 18px;
            font-weight: 900;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            border: none;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-export:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="text-center mb-10">
        <h1 class="text-3xl font-black italic tracking-tighter">PXTR STUDIO</h1>
        <div class="h-1 w-10 bg-blue-600 mx-auto mt-2 rounded-full"></div>
    </div>

    <!-- Live Preview -->
    <div id="captureArea">
        <div class="header-tags">
            <div class="tag tag-gray" id="progressTag">0%</div>
            <div class="tag tag-blue" id="dateTag">02.24.2026</div>
            <div class="tag tag-blue" id="handleTag">@PXTR30</div>
        </div>

        <div class="content-area">
            <div id="previewText">Focus.</div>
        </div>

        <div class="social-container">
            <div class="social-bar">
                <i class="fa-brands fa-facebook text-blue-500"></i>
                <i class="fa-brands fa-threads text-white"></i>
                <i class="fa-brands fa-tumblr text-blue-400"></i>
                <i class="fa-brands fa-reddit-alien text-orange-500"></i>
                <i class="fa-brands fa-discord text-indigo-400"></i>
                <i class="fa-brands fa-snapchat text-yellow-400"></i>
                <i class="fa-brands fa-tiktok text-cyan-400"></i>
                <i class="fa-brands fa-youtube text-red-600"></i>
                <i class="fa-brands fa-instagram text-pink-500"></i>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-container">
        <div class="grid grid-cols-2 gap-4 mb-5">
            <div>
                <span class="input-label">Date</span>
                <input type="text" id="inputDate" class="input-field" value="02.24.2026">
            </div>
            <div>
                <span class="input-label">Handle</span>
                <input type="text" id="inputHandle" class="input-field" value="@PXTR30">
            </div>
        </div>
        
        <div class="mb-6">
            <span class="input-label">Content</span>
            <textarea id="inputText" class="input-field h-24 resize-none">Focus.</textarea>
        </div>

        <button onclick="captureCard()" class="btn-export">
            <i class="fas fa-layer-group"></i> RENDER STUDIO SQUARE
        </button>
    </div>

    <script>
        const elements = {
            dateTag: document.getElementById('dateTag'),
            handleTag: document.getElementById('handleTag'),
            progressTag: document.getElementById('progressTag'),
            previewText: document.getElementById('previewText'),
            inputDate: document.getElementById('inputDate'),
            inputHandle: document.getElementById('inputHandle'),
            inputText: document.getElementById('inputText'),
            captureArea: document.getElementById('captureArea')
        };

        function calculateProgress() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const end = new Date(now.getFullYear() + 1, 0, 1);
            const progress = ((now - start) / (end - start)) * 100;
            elements.progressTag.innerText = Math.floor(progress) + '%';
        }

        calculateProgress();

        elements.inputDate.addEventListener('input', (e) => elements.dateTag.innerText = e.target.value);
        elements.inputHandle.addEventListener('input', (e) => elements.handleTag.innerText = e.target.value);
        elements.inputText.addEventListener('input', (e) => elements.previewText.innerText = e.target.value);

        async function captureCard() {
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> RENDERING MASTER...';
            btn.disabled = true;

            try {
                const canvas = await html2canvas(elements.captureArea, {
                    scale: 4, 
                    backgroundColor: "#05070a",
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    width: 450,
                    height: 450,
                    onclone: (clonedDoc) => {
                        const area = clonedDoc.getElementById('captureArea');
                        // Version 2.2 Fix: Remove all transparency/blur/shadow during render to prevent halos
                        area.style.boxShadow = 'none';
                        area.style.border = 'none';
                        const tags = clonedDoc.querySelectorAll('.tag-gray');
                        tags.forEach(t => t.style.backgroundColor = '#1e2638'); // Solid fallback for capture
                    }
                });

                const link = document.createElement('a');
                link.download = `pxtr-v2.2-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (err) {
                console.error("Capture Error:", err);
            } finally {
                btn.innerHTML = '<i class="fas fa-layer-group"></i> RENDER STUDIO SQUARE';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
