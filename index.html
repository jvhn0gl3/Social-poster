<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-wrapper {
            padding: 20px;
            background: transparent;
        }

        .card-container {
            width: 337.5px; 
            height: 600px; 
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 8px solid #1e293b;
            background: #000;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            transition: all 0.5s ease;
            position: relative;
        }

        .canvas-area.glow-mode {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }

        .safe-area-content {
            width: 100%;
            height: 422px; 
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .guides-active .safe-area-content {
            border-top: 1px dashed rgba(255,255,255,0.2);
            border-bottom: 1px dashed rgba(255,255,255,0.2);
        }

        .top-section {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .meta-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .caption-area {
            font-size: 10px;
            font-weight: 400;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.8);
            text-align: left;
            outline: none;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        /* Prevent clipping during capture */
        .is-capturing .caption-area {
            display: block !important;
            overflow: visible !important;
            -webkit-line-clamp: none !important;
        }

        .media-container {
            width: 100%;
            flex-grow: 1;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .media-asset {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: object-fit 0.3s ease;
        }

        .show-full-media {
            object-fit: contain !important;
        }

        .icon-bar-inline {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: fit-content;
        }

        .brand-pill, .date-pill {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            padding: 4px 10px;
            font-size: 7px;
            font-weight: 800;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            outline: none;
        }

        .controls-panel {
            margin-top: 20px;
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #1e293b;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .input-group { margin-bottom: 15px; }
        .input-label { display: block; font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            font-size: 14px;
            border: none;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #1e293b; border: 1px solid #334155; }
        .btn-record { background: #ef4444; }
        .recording-active { animation: pulse-red 2s infinite; }

        #dropOverlay {
            position: absolute;
            inset: 0;
            background: rgba(59, 130, 246, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="mb-6 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter">pxltr Studio</h1>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">9:16 Story (4:5 Safe Area)</p>
    </div>

    <div class="card-wrapper" id="captureTarget">
        <div class="card-container" id="captureCard">
            <div id="dropOverlay" class="text-white font-black text-xl italic uppercase">Drop Media</div>
            <div class="canvas-area glow-mode" id="cardCanvas">
                
                <div class="safe-area-content">
                    <div class="top-section">
                        <div class="meta-column">
                            <div class="date-pill" id="displayDate" contenteditable="true">01.21.2026</div>
                            <div class="brand-pill uppercase" id="displayHandle" contenteditable="true">@PXTR30</div>
                            <div class="icon-bar-inline">
                                <i class="fa-brands fa-youtube text-[8px]" style="color:#ff0000"></i>
                                <i class="fa-brands fa-instagram text-[8px]" style="color:#ff4d4d"></i>
                                <i class="fa-brands fa-threads text-[8px]" style="color:#fff"></i>
                            </div>
                        </div>
                        <div class="caption-area" id="displayCaption" contenteditable="true">
                            Visions of a digital dreamscape. Exploring the boundaries between reality and the artificial neon glare of the future.
                        </div>
                    </div>
                    
                    <div class="media-container">
                        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600" id="mainImage" class="media-asset show-full-media" crossorigin="anonymous">
                        <video id="mainVideo" class="media-asset hidden show-full-media" muted playsinline></video>
                    </div>
                </div>

                <div class="absolute bottom-10 flex justify-center w-full">
                    <div class="h-1.5 w-12 bg-white/30 rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="section-title">Display Settings</div>
        <div class="flex flex-wrap gap-4 mb-3">
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="fitMode" onchange="toggleFitMode()" checked> 
                <span>Letterbox</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="glowToggle" onchange="toggleGlow()" checked> 
                <span>Glow Mode</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                <input type="checkbox" id="guideToggle" onchange="toggleGuides()"> 
                <span>Show 4:5 Guides</span>
            </label>
        </div>

        <div class="section-title mt-4">Media</div>
        <div class="input-group">
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-clapperboard text-xs"></i> Select Media
            </button>
            <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(event)">
        </div>

        <div class="section-title mt-4">Meta</div>
        <div class="grid grid-cols-2 gap-4">
            <div class="input-group">
                <label class="input-label">Date</label>
                <input type="text" id="dateInput" oninput="updateFromInput('dateInput', 'displayDate', 'innerText')">
            </div>
            <div class="input-group">
                <label class="input-label">Handle</label>
                <input type="text" id="handleInput" oninput="updateFromInput('handleInput', 'displayHandle', 'innerText')">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Caption</label>
            <textarea id="captionInput" rows="2" oninput="updateFromInput('captionInput', 'displayCaption', 'innerText')"></textarea>
        </div>

        <div class="section-title mt-6">Export</div>
        <div class="flex flex-col gap-2">
            <button class="btn bg-emerald-600 hover:bg-emerald-500" onclick="downloadScreenshot()">
                <i class="fa-solid fa-camera"></i> Save 9:16 Story PNG
            </button>
            <button class="btn btn-record" id="recordBtn" onclick="toggleRecording()">
                <i class="fa-solid fa-circle"></i> <span id="recordBtnText">Record Clip</span>
            </button>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let activeStream = null;

        function toggleGuides() {
            const isGuides = document.getElementById('guideToggle').checked;
            const canvas = document.getElementById('cardCanvas');
            if (isGuides) canvas.classList.add('guides-active');
            else canvas.classList.remove('guides-active');
        }

        function toggleFitMode() {
            const isFit = document.getElementById('fitMode').checked;
            const elements = [document.getElementById('mainImage'), document.getElementById('mainVideo')];
            elements.forEach(el => {
                if (isFit) el.classList.add('show-full-media');
                else el.classList.remove('show-full-media');
            });
        }

        function toggleGlow() {
            const isGlow = document.getElementById('glowToggle').checked;
            const canvas = document.getElementById('cardCanvas');
            if (isGlow) canvas.classList.add('glow-mode');
            else canvas.classList.remove('glow-mode');
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const img = document.getElementById('mainImage');
            const video = document.getElementById('mainVideo');
            const reader = new FileReader();

            if (file.type.startsWith('image/')) {
                video.classList.add('hidden');
                video.pause();
                img.classList.remove('hidden');
                reader.onload = (e) => img.src = e.target.result;
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                img.classList.add('hidden');
                video.classList.remove('hidden');
                video.src = URL.createObjectURL(file);
                video.muted = false; 
                video.loop = false;
                video.currentTime = 0;
                video.play();
            }
            toggleFitMode();
        }

        function updateFromInput(inputId, targetId, property) {
            const val = document.getElementById(inputId).value;
            const target = document.getElementById(targetId);
            target[property] = val;
        }

        async function downloadScreenshot() {
            const element = document.getElementById('captureCard');
            
            // Set capture state to prevent CSS clipping
            document.body.classList.add('is-capturing');
            
            // Temporarily hide guides
            const guidesCheckbox = document.getElementById('guideToggle');
            const wasGuides = guidesCheckbox.checked;
            if (wasGuides) {
                guidesCheckbox.checked = false;
                toggleGuides();
            }

            try {
                const canvas = await html2canvas(element, { 
                    useCORS: true, 
                    scale: 3, // High-quality scale
                    backgroundColor: null,
                    logging: false,
                    width: element.offsetWidth,
                    height: element.offsetHeight,
                    onclone: (clonedDoc) => {
                        // Ensure cloned element has no scrollbars or offsets
                        const clonedEl = clonedDoc.getElementById('captureCard');
                        clonedEl.style.transform = "none";
                        clonedEl.style.margin = "0";
                    }
                });

                const link = document.createElement('a');
                link.download = `pxltr-story-safe-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (e) {
                console.error("Screenshot failed", e);
            } finally {
                // Restore state
                document.body.classList.remove('is-capturing');
                if (wasGuides) {
                    guidesCheckbox.checked = true;
                    toggleGuides();
                }
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            const text = document.getElementById('recordBtnText');
            const video = document.getElementById('mainVideo');
            
            if (!isRecording) {
                try {
                    activeStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { cursor: "never" },
                        audio: true
                    });

                    recordedChunks = [];
                    mediaRecorder = new MediaRecorder(activeStream, { mimeType: 'video/webm;codecs=vp9' });

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) recordedChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        const handle = document.getElementById('displayHandle').innerText.replace('@', '');
                        a.download = `pxtr-story-safe-${handle || 'design'}-${Date.now()}.webm`;
                        a.click();
                        
                        if (activeStream) {
                            activeStream.getTracks().forEach(track => track.stop());
                        }
                        
                        isRecording = false;
                        btn.classList.remove('recording-active');
                        text.innerText = "Record Clip";
                    };

                    if (!video.classList.contains('hidden')) {
                        video.currentTime = 0;
                        video.play();
                        video.onended = () => { if (isRecording) mediaRecorder.stop(); };
                    }

                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('recording-active');
                    text.innerText = "Stop Recording";

                } catch (err) {
                    console.error("Recording error:", err);
                }
            } else {
                mediaRecorder.stop();
            }
        }

        const dropZone = document.getElementById('captureCard');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dropOverlay').style.display = 'flex'; });
        dropZone.addEventListener('dragleave', () => { document.getElementById('dropOverlay').style.display = 'none'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('dropOverlay').style.display = 'none';
            handleFileUpload({ target: { files: e.dataTransfer.files } });
        });

        window.onload = () => {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}.${now.getFullYear()}`;
            document.getElementById('displayDate').innerText = dateStr;
            document.getElementById('dateInput').value = dateStr;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText;
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText;
        };
    </script>
</body>
</html>
