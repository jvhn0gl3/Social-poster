<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card-wrapper {
            padding: 20px;
            background: transparent;
        }

        .card-container {
            width: 320px; 
            height: 540px; 
            position: relative;
            overflow: hidden;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 6px solid #1e293b;
            background: #000;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header-meta-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 12px; 
            width: 100%;
            z-index: 10;
        }

        .media-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            min-height: 220px; 
            max-height: 220px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Unified Media Styling */
        .media-asset {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: object-fit 0.3s ease;
        }

        .show-full-media {
            object-fit: contain !important;
        }

        .caption-area {
            margin-top: 16px; 
            padding: 0 12px;
            font-size: 13px;
            font-weight: 300;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            min-height: 80px; 
            text-align: center;
            outline: none;
            z-index: 10;
        }

        .icon-bar-inline {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-pill, .date-pill {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            padding: 4px 8px;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 0.1em;
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            outline: none;
        }

        .controls-panel {
            margin-top: 40px;
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #1e293b;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after, .section-title::before {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .input-group { margin-bottom: 15px; }
        .input-label { display: block; font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            font-size: 14px;
            border: none;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #1e293b; border: 1px solid #334155; }
        .btn-record { background: #ef4444; }
        .recording-active { animation: pulse-red 2s infinite; }

        @keyframes pulse-red {
            0% { background: #ef4444; }
            50% { background: #991b1b; }
            100% { background: #ef4444; }
        }

        #dropOverlay {
            position: absolute;
            inset: 0;
            background: rgba(59, 130, 246, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="mb-8 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter">pxltr Studio</h1>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Video & Image Social Assets</p>
    </div>

    <div class="card-wrapper" id="captureTarget">
        <div class="card-container" id="captureCard">
            <div id="dropOverlay" class="text-white font-black text-xl italic uppercase">Drop Media</div>
            <div class="canvas-area" id="cardCanvas">
                <div class="header-meta-row">
                    <div class="date-pill" id="displayDate" contenteditable="true">01.21.2026</div>
                    <div class="brand-pill uppercase" id="displayHandle" contenteditable="true">@PXTR30</div>
                    <div class="icon-bar-inline">
                        <i class="fa-brands fa-youtube" style="color:#ff0000"></i>
                        <i class="fa-brands fa-instagram" style="color:#ff4d4d"></i>
                        <i class="fa-brands fa-threads" style="color:#fff"></i>
                    </div>
                </div>
                
                <div class="media-container">
                    <!-- Same class applied to both to ensure identical layout -->
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600" id="mainImage" class="media-asset show-full-media" crossorigin="anonymous">
                    <video id="mainVideo" class="media-asset hidden show-full-media" loop muted playsinline></video>
                </div>

                <div class="caption-area" id="displayCaption" contenteditable="true">
                    Visions of a digital dreamscape. Exploring the boundaries between reality and the artificial neon glare of the future.
                </div>

                <div class="h-1 w-10 bg-white/20 rounded-full mt-6"></div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="section-title">Media Assets</div>
        
        <div class="input-group">
            <div class="flex justify-between items-end mb-2">
                <label class="input-label mb-0">Upload (Image/Video)</label>
                <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400">
                    <input type="checkbox" id="fitMode" onchange="toggleFitMode()" checked> 
                    <span>Show Entire</span>
                </label>
            </div>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-clapperboard text-xs"></i> Select Media
            </button>
            <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(event)">
        </div>

        <div class="section-title mt-4">Meta Information</div>
        <div class="grid grid-cols-2 gap-4">
            <div class="input-group">
                <label class="input-label">Date</label>
                <input type="text" id="dateInput" oninput="updateFromInput('dateInput', 'displayDate', 'innerText')">
            </div>
            <div class="input-group">
                <label class="input-label">Handle</label>
                <input type="text" id="handleInput" oninput="updateFromInput('handleInput', 'displayHandle', 'innerText')">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Caption</label>
            <textarea id="captionInput" rows="2" oninput="updateFromInput('captionInput', 'displayCaption', 'innerText')"></textarea>
        </div>

        <div class="section-title mt-6">Export Studio</div>
        <div class="flex flex-col gap-2">
            <button class="btn bg-emerald-600 hover:bg-emerald-500" onclick="downloadScreenshot()">
                <i class="fa-solid fa-camera"></i> Snapshot (PNG)
            </button>
            <button class="btn btn-record" id="recordBtn" onclick="toggleRecording()">
                <i class="fa-solid fa-circle"></i> <span id="recordBtnText">Record Card Clip</span>
            </button>
            <p class="text-[9px] text-slate-500 text-center uppercase tracking-widest mt-1">Recording captures card audio if present</p>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        function toggleFitMode() {
            const isFit = document.getElementById('fitMode').checked;
            const elements = [document.getElementById('mainImage'), document.getElementById('mainVideo')];
            elements.forEach(el => {
                if (isFit) el.classList.add('show-full-media');
                else el.classList.remove('show-full-media');
            });
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const img = document.getElementById('mainImage');
            const video = document.getElementById('mainVideo');
            const reader = new FileReader();

            if (file.type.startsWith('image/')) {
                video.classList.add('hidden');
                video.pause();
                img.classList.remove('hidden');
                reader.onload = (e) => img.src = e.target.result;
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                img.classList.add('hidden');
                video.classList.remove('hidden');
                video.src = URL.createObjectURL(file);
                video.muted = false; 
                video.play();
            }
            toggleFitMode(); // Maintain fit mode consistency on new upload
        }

        function updateFromInput(inputId, targetId, property) {
            const val = document.getElementById(inputId).value;
            const target = document.getElementById(targetId);
            target[property] = val;
        }

        async function downloadScreenshot() {
            const element = document.getElementById('captureCard');
            const canvas = await html2canvas(element, { useCORS: true, scale: 2 });
            const link = document.createElement('a');
            link.download = `card-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        async function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            const text = document.getElementById('recordBtnText');
            
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({
                        video: { cursor: "never" },
                        audio: true
                    });

                    recordedChunks = [];
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) recordedChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `card-recording-${Date.now()}.webm`;
                        a.click();
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('recording-active');
                    text.innerText = "Stop Recording";
                } catch (err) {
                    console.error("Recording error:", err);
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording-active');
                text.innerText = "Record Card Clip";
            }
        }

        const dropZone = document.getElementById('captureCard');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dropOverlay').style.display = 'flex'; });
        dropZone.addEventListener('dragleave', () => { document.getElementById('dropOverlay').style.display = 'none'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('dropOverlay').style.display = 'none';
            handleFileUpload({ target: { files: e.dataTransfer.files } });
        });

        window.onload = () => {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}.${now.getFullYear()}`;
            document.getElementById('displayDate').innerText = dateStr;
            document.getElementById('dateInput').value = dateStr;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText;
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText;
        };
    </script>
</body>
</html>
