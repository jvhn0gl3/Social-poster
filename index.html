<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio - Bold Header 1:1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #2563eb;
            --bg-dark: #05070a;
            --card-bg: rgba(15, 19, 31, 0.98);
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #exportSquare {
            width: 1000px; 
            height: 1000px;
            zoom: 0.5; 
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.8s ease;
        }

        .theme-default { background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.15) 0px, transparent 50%); }
        .theme-art { background-image: radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.2) 0px, transparent 50%); }
        .theme-success { background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.2) 0px, transparent 50%); }
        .theme-alert { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.2) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(220, 38, 38, 0.2) 0px, transparent 50%); }

        .post-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 860px; /* Adjusted for larger header impact */
            position: relative;
        }

        /* Enlarged Unified Meta Row */
        .unified-meta-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 28px;
            padding: 16px 36px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .meta-tags-group { 
            display: flex; 
            gap: 12px; 
            align-items: center;
        }

        .divider {
            width: 2px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 8px;
        }

        .social-group {
            display: flex;
            gap: 18px;
            align-items: center;
        }
        
        [contenteditable="true"] { outline: none; }

        .tag {
            height: 40px; /* Taller tags */
            padding: 0 16px; 
            font-size: 13px; /* Bigger font */
            font-weight: 900;
            display: flex; 
            align-items: center; 
            text-transform: uppercase;
            border-radius: 8px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tag-blue { background: var(--accent); color: #ffffff; }
        .tag-gray { background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.8); }

        .social-icon-small {
            font-size: 22px; /* Bigger icons */
            opacity: 0.85;
            transition: transform 0.2s, opacity 0.2s;
        }
        .social-icon-small:hover { 
            opacity: 1; 
            transform: scale(1.15);
        }

        #captureArea {
            width: 100%; 
            height: 640px; /* Slightly reduced to keep everything in safe zone */
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: 64px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .content-area {
            flex-grow: 1; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 40px 80px;
        }

        #previewText { 
            font-weight: 900; 
            color: #ffffff; 
            letter-spacing: -0.04em; 
            line-height: 1.15; 
            width: 100%; 
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            white-space: pre-wrap;
        }

        .controls-container {
            width: 300px; margin-top: 20px;
            text-align: center;
        }
        .btn-blue { background: var(--accent); color: white; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; font-size: 12px; }
        
        #copyToast {
            position: fixed; bottom: 20px; background: #10b981; color: white;
            padding: 10px 25px; border-radius: 30px; font-weight: 700;
            transform: translateY(100px); transition: transform 0.3s;
            z-index: 200; font-size: 12px;
        }
    </style>
</head>
<body class="theme-default">

    <div id="copyToast">TEXT COPIED!</div>

    <div id="exportSquare" class="theme-default">
        <div class="post-wrapper">
            
            <!-- Bigger Unified Meta Row -->
            <div class="unified-meta-row">
                <div class="meta-tags-group">
                    <div class="tag tag-gray" contenteditable="true">DAY 068</div>
                    <div class="tag tag-gray" contenteditable="true">18%</div>
                    <div class="tag tag-blue" contenteditable="true">03.09.2026</div>
                    <div class="tag tag-blue" contenteditable="true">@jvhn0gl3</div>
                </div>
                
                <div class="divider"></div>

                <div class="social-group">
                    <i class="fa-brands fa-facebook social-icon-small text-[#1877F2]"></i>
                    <i class="fa-brands fa-youtube social-icon-small text-[#FF0000]"></i>
                    <i class="fa-brands fa-tiktok social-icon-small text-white"></i>
                    <i class="fa-brands fa-snapchat social-icon-small text-[#FFFC00]"></i>
                    <i class="fa-brands fa-instagram social-icon-small text-[#E4405F]"></i>
                    <i class="fa-brands fa-threads social-icon-small text-white"></i>
                    <i class="fa-brands fa-discord social-icon-small text-[#5865F2]"></i>
                    <i class="fa-brands fa-tumblr social-icon-small text-[#36465D]"></i>
                    <i class="fa-brands fa-x-twitter social-icon-small text-white"></i>
                </div>
            </div>

            <div id="captureArea">
                <div class="main-content">
                    <div class="content-area">
                        <div id="previewText" contenteditable="true">"Where'd your depth go?"

It didn't go anywhere. Life just got loud.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <button onclick="prepAndFullscreen()" class="btn-blue">
            Prepare Square Screenshot
        </button>
    </div>

    <script>
        const pText = document.getElementById('previewText');
        const sq = document.getElementById('exportSquare');
        const toast = document.getElementById('copyToast');

        const themes = {
            art: ['design', 'art', 'style', 'love', 'creative', 'depth'],
            success: ['success', 'win', 'green', 'done'],
            alert: ['alert', 'warning', 'fire', 'stop', 'hot', 'error', 'quit', 'delete', 'loud']
        };

        function adjustFontSize() {
            let fontSize = 80; 
            pText.style.fontSize = fontSize + 'px';
            const container = pText.parentElement;
            
            while ((pText.scrollHeight > container.offsetHeight - 40 || pText.scrollWidth > container.offsetWidth - 40) && fontSize > 20) {
                fontSize -= 1;
                pText.style.fontSize = fontSize + 'px';
            }
        }

        function updateBackground() {
            const lowerText = pText.innerText.toLowerCase();
            let theme = 'theme-default';
            if (themes.art.some(w => lowerText.includes(w))) theme = 'theme-art';
            else if (themes.success.some(w => lowerText.includes(w))) theme = 'theme-success';
            else if (themes.alert.some(w => lowerText.includes(w))) theme = 'theme-alert';
            sq.className = theme;
        }

        async function prepAndFullscreen() {
            try {
                const textToCopy = pText.innerText;
                const hiddenInput = document.createElement('textarea');
                hiddenInput.value = textToCopy;
                document.body.appendChild(hiddenInput);
                hiddenInput.select();
                document.execCommand('copy');
                document.body.removeChild(hiddenInput);
                toast.style.transform = 'translateY(0)';
                setTimeout(() => toast.style.transform = 'translateY(100px)', 2000);
            } catch (e) {}
            
            if (!document.fullscreenElement) {
                sq.requestFullscreen().catch(() => {});
            }
        }

        pText.addEventListener('input', () => {
            updateBackground();
            adjustFontSize();
        });

        document.querySelectorAll('[contenteditable]').forEach(el => {
            el.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });
        });

        window.addEventListener('load', () => {
            adjustFontSize();
            updateBackground();
        });
    </script>
</body>
</html>
