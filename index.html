<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxltr Studio Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            background-color: #0a0e1a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .preview-card {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #161b30, #0f1324);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .tag {
            background: #2563eb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 8px;
        }

        .preview-image-container {
            transition: all 0.3s ease;
        }

        .preview-image {
            width: 100%;
            height: 180px;
            border-radius: 24px;
            object-fit: cover;
            margin-top: 15px;
            background: #1e293b;
        }

        .text-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        #previewText {
            transition: all 0.3s ease;
        }

        /* Large text style for Text Only mode */
        .text-only-mode #previewText {
            font-size: 24px;
            line-height: 1.4;
            font-weight: 600;
            display: flex;
            align-items: center;
            flex-grow: 1;
            margin-top: 20px;
        }

        .social-bar {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            width: fit-content;
        }

        .social-bar i {
            font-size: 0.8rem;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            margin-top: 40px;
            border-radius: 30px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-field {
            background: #161b30;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            color: white;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .section-label {
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .mode-btn {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .mode-btn.active {
            background: #3b82f6;
        }

        #loadingOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            z-index: 10;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1 class="text-3xl font-black italic mb-1">pxltr Studio Square</h1>
    <p class="text-[10px] tracking-[3px] text-gray-500 font-bold mb-8 uppercase">1:1 High-Resolution Screenshots</p>

    <!-- Preview Card -->
    <div class="preview-card" id="captureArea">
        <div class="text-container" id="textContainer">
            <div class="flex gap-2">
                <span class="tag" id="dateTag">02.24.2026</span>
                <span class="tag" id="handleTag">@PXTR30</span>
            </div>
            <div id="previewText" class="text-gray-300 text-sm mt-2 leading-relaxed">
                Native 800x800 square resolution. Perfect for manual high-quality screenshots.
            </div>
        </div>

        <div class="relative preview-image-container" id="imageContainer">
            <div id="loadingOverlay"><div class="spinner"></div></div>
            <img id="mainImage" class="preview-image" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80" alt="Visual Content">
        </div>

        <div class="flex justify-between items-center mt-4">
            <div class="social-bar">
                <i class="fa-brands fa-facebook text-blue-500" title="Facebook"></i>
                <i class="fa-brands fa-threads text-white" title="Threads"></i>
                <i class="fa-brands fa-tumblr text-blue-400" title="Tumblr"></i>
                <i class="fa-brands fa-reddit-alien text-orange-500" title="Reddit"></i>
                <i class="fa-brands fa-discord text-indigo-400" title="Discord"></i>
                <i class="fa-brands fa-snapchat text-yellow-400" title="Snapchat"></i>
                <i class="fa-brands fa-tiktok text-cyan-400" title="TikTok"></i>
                <i class="fa-brands fa-youtube text-red-600" title="YouTube"></i>
                <i class="fa-brands fa-instagram text-pink-500" title="Instagram"></i>
            </div>
            <div class="w-10 h-1 bg-gray-700 rounded-full"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-container">
        <div class="section-label">Square Modes</div>
        <div class="flex gap-2 mb-6">
            <div class="mode-btn active" onclick="setMode('standard')">Standard</div>
            <div class="mode-btn" onclick="setMode('text')">Text Only</div>
        </div>

        <div class="section-label">Visuals</div>
        <button onclick="document.getElementById('fileInput').click()" class="input-field bg-gray-800 border-none hover:bg-gray-700 flex justify-center items-center gap-2 mb-2">
            <i class="fas fa-upload"></i> Upload Image/Video
        </button>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        
        <div class="flex gap-2">
            <input type="text" id="aiPrompt" class="input-field flex-1" placeholder="AI Image Gen...">
            <button onclick="generateAIImage()" class="bg-blue-600 hover:bg-blue-500 rounded-xl px-4 mb-3">
                <i class="fas fa-wand-magic-sparkles"></i>
            </button>
        </div>

        <div class="section-label">Details</div>
        <div class="flex gap-2">
            <input type="text" id="inputDate" class="input-field" value="02.24.2026">
            <input type="text" id="inputHandle" class="input-field" value="@PXTR30">
        </div>
        <textarea id="inputText" class="input-field h-24 resize-none" placeholder="Enter content text...">Native 800x800 square resolution. Perfect for manual high-quality screenshots.</textarea>
    </div>

    <script>
        const apiKey = ""; // Environment handles this

        // State & DOM Elements
        const elements = {
            dateTag: document.getElementById('dateTag'),
            handleTag: document.getElementById('handleTag'),
            previewText: document.getElementById('previewText'),
            textContainer: document.getElementById('textContainer'),
            imageContainer: document.getElementById('imageContainer'),
            mainImage: document.getElementById('mainImage'),
            inputDate: document.getElementById('inputDate'),
            inputHandle: document.getElementById('inputHandle'),
            inputText: document.getElementById('inputText'),
            fileInput: document.getElementById('fileInput'),
            aiPrompt: document.getElementById('aiPrompt'),
            loadingOverlay: document.getElementById('loadingOverlay'),
            captureArea: document.getElementById('captureArea')
        };

        // Real-time Updates
        elements.inputDate.addEventListener('input', (e) => elements.dateTag.innerText = e.target.value);
        elements.inputHandle.addEventListener('input', (e) => elements.handleTag.innerText = e.target.value);
        elements.inputText.addEventListener('input', (e) => elements.previewText.innerText = e.target.value);

        // Mode Switching
        function setMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Reset classes
            elements.captureArea.classList.remove('text-only-mode');

            if (mode === 'text') {
                elements.captureArea.classList.add('text-only-mode');
                elements.textContainer.style.display = 'flex';
                elements.imageContainer.style.display = 'none';
            } else {
                elements.textContainer.style.display = 'flex';
                elements.imageContainer.style.display = 'block';
            }
        }

        // Image Upload
        elements.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    elements.mainImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // AI Image Generation with Retry Logic
        async function generateAIImage() {
            const prompt = elements.aiPrompt.value.trim();
            if (!prompt) return;

            elements.loadingOverlay.style.display = 'flex';
            
            const fetchWithRetry = async (retries = 5, delay = 1000) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: [{ prompt: prompt }],
                            parameters: { sampleCount: 1 }
                        })
                    });

                    if (!response.ok) throw new Error('Generation failed');
                    
                    const result = await response.json();
                    if (result.predictions && result.predictions[0]) {
                        elements.mainImage.src = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    }
                } catch (error) {
                    if (retries > 0) {
                        await new Promise(res => setTimeout(res, delay));
                        return fetchWithRetry(retries - 1, delay * 2);
                    }
                    console.error("Final attempt failed:", error);
                    const errorBox = document.createElement('div');
                    errorBox.className = "fixed bottom-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-lg z-50";
                    errorBox.innerText = "Failed to generate image. Please try again.";
                    document.body.appendChild(errorBox);
                    setTimeout(() => errorBox.remove(), 3000);
                } finally {
                    elements.loadingOverlay.style.display = 'none';
                }
            };

            await fetchWithRetry();
        }
    </script>
</body>
</html>
