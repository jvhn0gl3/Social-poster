<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .app-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
            max-width: 900px;
            margin-top: 10px;
        }

        .card-container {
            width: 320px; 
            height: 568px;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8);
            border: 4px solid #1e293b;
            background: #000;
            flex-shrink: 0;
            /* Explicitly set transform-origin for capture stability */
            transform-origin: top left;
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            background: #0f172a; /* Solid fallback for capture */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .safe-zone-1to1 {
            width: 280px; 
            height: 280px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.15); 
            box-sizing: border-box;
        }

        .header-meta-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            width: 100%;
            flex-shrink: 0;
        }

        .meta-pills {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .caption-text-area {
            flex: 1;
            font-size: 9px;
            font-weight: 300;
            line-height: 1.2;
            color: rgba(255, 255, 255, 0.9);
            max-height: 30px;
            overflow: hidden;
            word-wrap: break-word;
        }

        .main-media-container {
            width: 100%;
            height: 180px; /* Fixed height inside the safe zone to prevent layout shifts */
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .main-media {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            width: 100%;
            flex-shrink: 0;
        }

        .icon-bar-inline {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
        }

        .brand-pill, .date-pill {
            background: #3b82f6;
            color: white;
            border-radius: 100px;
            padding: 2px 8px;
            font-size: 7px;
            font-weight: 800;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .controls-panel {
            width: 340px;
            background: #0f172a;
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: #1e293b;
        }

        .input-group { margin-bottom: 12px; }
        .input-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 10px;
            color: white;
            font-size: 12px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            display: block;
            width: 100%;
            font-size: 13px;
            transition: all 0.2s;
            border: none;
        }

        .btn-download { background: #10b981; }
        .btn-recording { background: #ef4444; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        [contenteditable="true"]:focus { outline: none; background: rgba(59, 130, 246, 0.2); border-radius: 4px; }

        @media (max-width: 700px) {
            .app-wrapper { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="mb-4 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter">pxltr Studio</h1>
        <p class="text-slate-400 text-[9px] uppercase tracking-widest">Multimedia Safe-Zone</p>
    </div>

    <div class="app-wrapper">
        <div class="card-container" id="captureCard">
            <div class="canvas-area" id="canvasArea">
                <div class="safe-zone-1to1" id="safeZone">
                    <div class="header-meta-row">
                        <div class="meta-pills">
                            <div class="date-pill" id="displayDate" contenteditable="true">01.31.2026</div>
                            <div class="brand-pill uppercase" id="displayHandle" contenteditable="true">@PXTR30</div>
                        </div>
                        <div class="caption-text-area" id="displayCaption" contenteditable="true">
                            Capturing the motion of the digital era.
                        </div>
                    </div>
                    
                    <div class="main-media-container" id="mediaContainer">
                        <img 
                            src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600" 
                            id="mainImage" 
                            class="main-media"
                            crossorigin="anonymous"
                        >
                        <video id="mainVideo" class="main-media hidden" muted playsinline></video>
                    </div>

                    <div class="footer-row">
                        <div class="icon-bar-inline">
                            <i class="fa-brands fa-youtube text-[8px]" style="color:#ff0000"></i>
                            <i class="fa-brands fa-instagram text-[8px]" style="color:#ff4d4d"></i>
                            <i class="fa-brands fa-threads text-[8px]" style="color:#fff"></i>
                        </div>
                        <div class="h-0.5 w-8 bg-white/20 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="section-title">Visuals</div>
            <div class="flex flex-col gap-2 mb-3">
                <div class="flex gap-2">
                    <button class="btn bg-slate-800 border border-slate-700 flex-1 flex items-center justify-center gap-2" onclick="document.getElementById('fileInput').click()">
                        <i class="fa-solid fa-file-import text-[10px]"></i> Upload
                    </button>
                    <button id="actionBtn" class="btn btn-download flex-1 flex items-center justify-center gap-2" onclick="handleExport()">
                        <i id="actionIcon" class="fa-solid fa-download text-[10px]"></i> 
                        <span id="actionText">Pull PNG</span>
                    </button>
                </div>
                <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(event)">
            </div>

            <div class="section-title mt-4">Content</div>
            <div class="grid grid-cols-2 gap-2 mb-2">
                <div class="input-group">
                    <label class="input-label">Date</label>
                    <input type="text" id="dateInput" oninput="updateFromInput('dateInput', 'displayDate')">
                </div>
                <div class="input-group">
                    <label class="input-label">Handle</label>
                    <input type="text" id="handleInput" oninput="updateFromInput('handleInput', 'displayHandle')">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Caption</label>
                <textarea id="captionInput" rows="2" oninput="updateFromInput('captionInput', 'displayCaption')"></textarea>
            </div>

            <div class="section-title mt-4">AI Creator</div>
            <div class="input-group">
                <div class="flex gap-1">
                    <input type="text" id="aiPrompt" placeholder="Generate art...">
                    <button class="btn w-16" id="genImageBtn" onclick="generateAIImage()">
                        <div class="loading-spinner" id="genSpinner"></div>
                        <span id="genText">Go</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let isVideoMode = false;
        let mediaRecorder;
        let recordedChunks = [];

        function updateFromInput(inputId, targetId) {
            document.getElementById(targetId).innerText = document.getElementById(inputId).value;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const imageEl = document.getElementById('mainImage');
            const videoEl = document.getElementById('mainVideo');
            const actionText = document.getElementById('actionText');

            if (file.type.startsWith('video/')) {
                isVideoMode = true;
                imageEl.classList.add('hidden');
                videoEl.classList.remove('hidden');
                videoEl.src = URL.createObjectURL(file);
                actionText.innerText = "Record Canvas";
            } else {
                isVideoMode = false;
                videoEl.classList.add('hidden');
                imageEl.classList.remove('hidden');
                const reader = new FileReader();
                reader.onload = (e) => { imageEl.src = e.target.result; };
                reader.readAsDataURL(file);
                actionText.innerText = "Pull PNG";
            }
        }

        async function handleExport() {
            if (isVideoMode) {
                recordCanvas();
            } else {
                downloadPNG();
            }
        }

        async function downloadPNG() {
            const card = document.getElementById('captureCard');
            const safeZone = document.getElementById('safeZone');
            
            // Temporary styles to ensure clean capture
            const originalBorder = safeZone.style.border;
            safeZone.style.border = 'none';
            
            // Scroll to top to prevent offset issues with html2canvas
            window.scrollTo(0,0);

            try {
                const canvas = await html2canvas(card, {
                    scale: 3, // High DPI
                    useCORS: true,
                    backgroundColor: "#000000",
                    logging: false,
                    width: 320,
                    height: 568,
                    x: 0,
                    y: 0,
                    scrollX: 0,
                    scrollY: -window.scrollY // Compensate for scroll
                });
                
                const link = document.createElement('a');
                link.download = `pxltr-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (err) { 
                console.error("PNG Capture Error:", err); 
            } finally { 
                safeZone.style.border = originalBorder; 
            }
        }

        async function recordCanvas() {
            const card = document.getElementById('captureCard');
            const video = document.getElementById('mainVideo');
            const btn = document.getElementById('actionBtn');
            const safeZone = document.getElementById('safeZone');
            
            btn.classList.add('btn-recording');
            btn.innerText = "Recording...";
            const originalBorder = safeZone.style.border;
            safeZone.style.border = 'none';

            video.currentTime = 0;
            
            try {
                // Capture at 60fps for smoothness
                const stream = card.captureStream(60);
                mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: 'video/webm; codecs=vp9',
                    videoBitsPerSecond: 5000000 // 5Mbps for quality
                });
                recordedChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `pxltr-video-${Date.now()}.webm`;
                    a.click();
                    
                    btn.classList.remove('btn-recording');
                    btn.innerText = "Record Canvas";
                    safeZone.style.border = originalBorder;
                };

                mediaRecorder.start();
                video.play();

                video.onended = () => {
                    mediaRecorder.stop();
                    video.onended = null;
                };

            } catch (err) {
                console.error("Video Recording Error:", err);
                btn.classList.remove('btn-recording');
                btn.innerText = "Record Canvas";
                safeZone.style.border = originalBorder;
            }
        }

        async function generateAIImage() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) return;
            const btn = document.getElementById('genImageBtn'), spinner = document.getElementById('genSpinner'), text = document.getElementById('genText');
            btn.disabled = true; spinner.style.display = 'block'; text.style.display = 'none';

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ instances: [{ prompt: prompt }], parameters: { sampleCount: 1 } })
                });
                const data = await response.json();
                
                if (data.predictions?.[0]?.bytesBase64Encoded) {
                    isVideoMode = false;
                    document.getElementById('mainVideo').classList.add('hidden');
                    const img = document.getElementById('mainImage');
                    img.classList.remove('hidden');
                    img.src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    document.getElementById('actionText').innerText = "Pull PNG";
                }
            } catch (err) { 
                console.error("AI Generation Error:", err); 
            } finally { 
                btn.disabled = false; spinner.style.display = 'none'; text.style.display = 'inline'; 
            }
        }

        window.onload = () => {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}.${now.getFullYear()}`;
            document.getElementById('displayDate').innerText = dateStr;
            document.getElementById('dateInput').value = dateStr;
            document.getElementById('handleInput').value = document.getElementById('displayHandle').innerText;
            document.getElementById('captionInput').value = document.getElementById('displayCaption').innerText;
        };
    </script>
</body>
</html>
